<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernblatt — ORF-Nachrichten lesen & Deutsch lernen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF7; --paper-2:#F3F1EA; --ink:#1A1A18; --muted:#6B6B62;
    --line:#E3E0D6; --line-strong:#CFCBBE;
    --at-red:#C8102E;
    --der:#2563EB; --der-bg:#E8EFFD;
    --die:#D6206E; --die-bg:#FCE7F0;
    --das:#15803D; --das-bg:#E4F4E9;
    --ok:#15803D; --ok-bg:#E4F4E9; --bad:#C8102E; --bad-bg:#FBE7EA;
    --shadow:0 1px 2px rgba(26,26,24,.04), 0 8px 24px rgba(26,26,24,.06);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper); color:var(--ink); font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif; font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .serif{font-family:"Newsreader",Georgia,"Times New Roman",serif}
  button{font-family:inherit; cursor:pointer}
  ::selection{background:#FBE7EA}

  header.topbar{position:sticky; top:0; z-index:20; background:rgba(251,250,247,.88); backdrop-filter:blur(8px); border-bottom:1px solid var(--line);}
  .topwrap{max-width:1240px; margin:0 auto; padding:14px 22px; display:flex; align-items:center; gap:18px; flex-wrap:wrap}
  .brand{display:flex; align-items:baseline; gap:10px; margin-right:auto}
  .mark{font-family:"Newsreader",serif; font-weight:600; font-size:30px; letter-spacing:-.01em; line-height:1;}
  .mark .dot{color:var(--at-red)}
  .tagline{font-size:12.5px; color:var(--muted); letter-spacing:.02em}
  .controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .seg{display:inline-flex; background:var(--paper-2); border:1px solid var(--line); border-radius:999px; padding:3px}
  .seg button{border:0; background:transparent; color:var(--muted); font-size:13px; font-weight:600; padding:6px 12px; border-radius:999px; letter-spacing:.01em;}
  .seg button.on{background:#fff; color:var(--ink); box-shadow:var(--shadow)}
  .ctl-label{font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); margin-right:2px}
  .ghost{border:1px solid var(--line-strong); background:#fff; color:var(--ink); border-radius:999px; padding:8px 14px; font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:7px;}
  .ghost:hover{border-color:var(--ink)}
  .ghost svg{width:15px;height:15px}

  .shell{max-width:1240px; margin:0 auto; padding:22px; display:grid; grid-template-columns:320px 1fr; gap:24px; align-items:start}
  @media(max-width:920px){ .shell{grid-template-columns:1fr; padding:16px} }

  aside.feed{position:sticky; top:84px}
  @media(max-width:920px){ aside.feed{position:static} }
  .feed-head{display:flex; align-items:baseline; justify-content:space-between; margin:2px 4px 12px}
  .feed-head h2{font-family:"Newsreader",serif; font-weight:600; font-size:20px; margin:0}
  .feed-date{font-size:12px; color:var(--muted)}
  .hlist{display:flex; flex-direction:column; gap:8px; max-height:calc(100vh - 150px); overflow:auto; padding-right:4px}
  @media(max-width:920px){ .hlist{max-height:none} }
  .hcard{text-align:left; width:100%; background:#fff; border:1px solid var(--line); border-radius:12px; padding:13px 14px; transition:border-color .15s, transform .15s;}
  .hcard:hover{border-color:var(--line-strong); transform:translateY(-1px)}
  .hcard.active{border-color:var(--at-red); box-shadow:0 0 0 1px var(--at-red) inset}
  .hcat{font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--at-red); font-weight:700}
  .htitle{font-family:"Newsreader",serif; font-size:17px; line-height:1.25; margin:4px 0 4px; font-weight:500}
  .hteaser{font-size:12.5px; color:var(--muted); line-height:1.4}

  main.read{min-height:60vh}
  .empty{background:#fff; border:1px dashed var(--line-strong); border-radius:var(--radius); padding:48px 36px; text-align:center; color:var(--muted);}
  .empty h3{font-family:"Newsreader",serif; color:var(--ink); font-size:24px; margin:0 0 8px; font-weight:500}
  .legend{display:inline-flex; gap:16px; margin-top:22px; flex-wrap:wrap; justify-content:center}
  .legend span{display:inline-flex; align-items:center; gap:7px; font-size:13px; color:var(--ink)}
  .swatch{width:13px; height:13px; border-radius:4px; display:inline-block}

  .panel{background:#fff; border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
  .art-head{padding:24px 28px 18px; border-bottom:1px solid var(--line)}
  .art-cat{font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--at-red); font-weight:700}
  .art-title{font-family:"Newsreader",serif; font-weight:600; font-size:30px; line-height:1.15; letter-spacing:-.01em; margin:8px 0 0}
  @media(max-width:560px){ .art-title{font-size:24px} }
  .art-note{margin:12px 0 0; font-size:12.5px; color:var(--muted); font-style:italic}

  .audiobar{display:flex; align-items:center; gap:12px; padding:14px 28px; background:var(--paper-2); border-bottom:1px solid var(--line); flex-wrap:wrap}
  .playbtn{border:0; background:var(--at-red); color:#fff; border-radius:999px; width:42px; height:42px; display:grid; place-items:center; flex:0 0 auto;}
  .playbtn svg{width:18px;height:18px;fill:#fff}
  .playbtn.small{width:28px;height:28px;background:transparent;color:var(--muted)}
  .playbtn.small svg{width:15px;height:15px;fill:var(--muted)}
  .playbtn.small:hover svg{fill:var(--at-red)}
  .audio-label{font-size:13px; font-weight:600}
  .rate{display:flex; align-items:center; gap:8px; margin-left:auto; font-size:12px; color:var(--muted)}
  .rate input{accent-color:var(--at-red)}

  .sentences{padding:6px 0}
  .srow{display:grid; grid-template-columns:1fr 1fr; gap:22px; padding:14px 28px; border-bottom:1px solid var(--line); align-items:start;}
  @media(max-width:680px){ .srow{grid-template-columns:1fr; gap:6px} }
  .srow:last-child{border-bottom:0}
  .srow.speaking{background:#FFFCF4}
  .s-de{font-family:"Newsreader",serif; font-size:19px; line-height:1.5; position:relative;}
  .s-de .mini{position:absolute; left:-26px; top:3px}
  @media(max-width:680px){ .s-de .mini{position:static; margin-right:6px; display:inline-flex; vertical-align:middle} }
  .s-tr{font-size:15px; color:#4A4A42; line-height:1.55; padding-top:2px}
  .s-tr.pending{color:var(--muted); font-style:italic}
  .col-tags{display:flex; gap:18px; padding:10px 28px 2px; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted)}
  @media(max-width:680px){ .col-tags{display:none} }

  .n{font-weight:500; border-radius:4px; padding:0 2px}
  .n.der{color:var(--der); background:var(--der-bg)}
  .n.die{color:var(--die); background:var(--die-bg)}
  .n.das{color:var(--das); background:var(--das-bg)}

  .tabs{display:flex; gap:4px; padding:16px 28px 0; border-top:1px solid var(--line); background:#fff}
  .tab{border:0; background:transparent; padding:10px 4px; margin-right:20px; font-size:14px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent}
  .tab.on{color:var(--ink); border-bottom-color:var(--at-red)}
  .tabbody{padding:20px 28px 30px}
  @media(max-width:560px){ .art-head,.audiobar,.srow,.col-tags,.tabs,.tabbody{padding-left:18px;padding-right:18px} }

  .sec-label{font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:700; margin:22px 0 10px}
  .sec-label:first-child{margin-top:0}
  .hint{font-size:12px;color:var(--muted);margin:-4px 0 10px;font-style:italic}

  .ngrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px}
  .ncard{border:1px solid var(--line); border-radius:11px; padding:11px 13px}
  .ncard .art{font-weight:700; font-size:13px}
  .ncard .word{font-family:"Newsreader",serif; font-size:18px; font-weight:500}
  .ncard.der{border-color:#BFD3FB} .ncard.der .art{color:var(--der)}
  .ncard.die{border-color:#F6C3DA} .ncard.die .art{color:var(--die)}
  .ncard.das{border-color:#BFE5C9} .ncard.das .art{color:var(--das)}

  .gline{padding:11px 0; border-bottom:1px solid var(--line)}
  .gline:last-child{border-bottom:0}
  .gphrase{font-family:"Newsreader",serif; font-size:18px}
  .gphrase b{color:var(--at-red); font-weight:600}
  .pill{display:inline-block; font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; letter-spacing:.04em; vertical-align:middle; margin-left:8px}
  .pill.akk{background:#FFF1E6; color:#B45309}
  .pill.dat{background:#EEF2FF; color:#4338CA}
  .pill.wex{background:#F3EEFF; color:#6D28D9}
  .pill.gen{background:#FDF2F8; color:#9D174D}
  .gexp{font-size:13px; color:var(--muted); margin-top:4px}
  .gend{display:inline-block; background:var(--paper-2); border:1px solid var(--line); border-radius:6px; padding:1px 7px; font-weight:600; font-size:13px; color:var(--at-red)}

  table.decl{width:100%; border-collapse:collapse; font-size:13.5px; margin-top:6px}
  table.decl th, table.decl td{border:1px solid var(--line); padding:6px 9px; text-align:left}
  table.decl th{background:var(--paper-2); font-weight:600; font-size:12px}
  table.decl td b{color:var(--at-red)}

  .ex{border:1px solid var(--line); border-radius:12px; padding:15px 16px; margin-bottom:12px}
  .ex-q{font-size:15px; margin:0 0 11px}
  .ex-q .de{font-family:"Newsreader",serif; font-size:18px}
  .opts{display:flex; gap:8px; flex-wrap:wrap}
  .opt{border:1px solid var(--line-strong); background:#fff; border-radius:9px; padding:8px 14px; font-size:14px; font-weight:600; transition:.12s;}
  .opt:hover:not(:disabled){border-color:var(--ink)}
  .opt:disabled{cursor:default; opacity:1}
  .opt.correct{background:var(--ok-bg); border-color:var(--ok); color:var(--ok)}
  .opt.wrong{background:var(--bad-bg); border-color:var(--bad); color:var(--bad)}
  .feedback{font-size:13px; margin-top:10px; padding:9px 12px; border-radius:8px; display:none}
  .feedback.show{display:block}
  .feedback.good{background:var(--ok-bg); color:#0f5a2c}
  .feedback.warn{background:var(--bad-bg); color:#8c0c20}
  textarea.trans{width:100%; border:1px solid var(--line-strong); border-radius:9px; padding:10px 12px; font-family:inherit; font-size:15px; resize:vertical; min-height:54px}
  textarea.trans:focus{outline:2px solid var(--at-red); outline-offset:1px; border-color:var(--at-red)}
  .reveal{margin-top:9px}
  .model-answer{display:none; margin-top:9px; padding:10px 12px; background:var(--das-bg); border-radius:8px; font-size:15px; font-family:"Newsreader",serif}
  .model-answer.show{display:block}
  .model-answer .lab{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--das); font-weight:700; display:block; margin-bottom:3px; font-family:"Inter",sans-serif}
  .scorechip{font-size:12px; font-weight:700; color:var(--muted); float:right}

  .skel{background:linear-gradient(90deg,#efece4 25%,#f6f4ee 50%,#efece4 75%); background-size:200% 100%; animation:sh 1.3s infinite; border-radius:6px}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  @media (prefers-reduced-motion: reduce){ .skel{animation:none} *{transition:none!important} }
  .spinwrap{display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px; padding:18px 28px}
  .spin{width:16px;height:16px;border:2px solid var(--line-strong);border-top-color:var(--at-red);border-radius:50%;animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .errbox{background:var(--bad-bg); border:1px solid #F0C5CC; color:#8c0c20; border-radius:10px; padding:14px 16px; margin:16px 28px; font-size:14px}
  .errbox button{margin-top:8px}
  .footer{max-width:1240px;margin:0 auto;padding:8px 22px 40px;color:var(--muted);font-size:11.5px;line-height:1.5}
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
</style>
</head>
<body>

<header class="topbar">
  <div class="topwrap">
    <div class="brand">
      <span class="mark serif">Lernblatt<span class="dot">.</span></span>
      <span class="tagline" id="tagline"></span>
    </div>
    <div class="controls">
      <span class="ctl-label" id="lblUi"></span>
      <div class="seg" id="uiSeg"><button data-ui="es" class="on">ES</button><button data-ui="en">EN</button></div>
      <span class="ctl-label" id="lblTrans"></span>
      <div class="seg" id="transSeg"><button data-tr="es" class="on">Español</button><button data-tr="en">English</button></div>
      <button class="ghost" id="refreshBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
        <span id="refreshLbl"></span>
      </button>
    </div>
  </div>
</header>

<div class="shell">
  <aside class="feed">
    <div class="feed-head"><h2 id="feedTitle"></h2><span class="feed-date" id="feedDate"></span></div>
    <div class="hlist" id="hlist"></div>
  </aside>
  <main class="read" id="read"></main>
</div>

<div class="footer" id="footer"></div>

<script>

   · Wiktionary (noun gender) · browser speech (audio) · client-side rules (cases). */

    exGender:"Identificar el género", exCases:"Akkusativ o Dativ", exTrans:"Traducción al alemán",

const state = { uiLang:"es", transLang:"es", headlines:null, activeId:null, tab:"gram", rate:0.95, cache:{} };
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const T = ()=>I18N[state.uiLang];
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const todayHuman = new Date().toLocaleDateString("de-AT",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

/* ---------------- networking helpers ---------------- */
function timeoutFetch(url, opts, ms){
  const c=new AbortController(); const id=setTimeout(()=>c.abort(), ms||15000);
  return fetch(url, Object.assign({}, opts, {signal:c.signal})).finally(()=>clearTimeout(id));
}
async function fetchJSON(url, ms){ const r=await timeoutFetch(url,{},ms); if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); }
async function fetchTextP(url, ms){ const r=await timeoutFetch(url,{},ms); if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); }

const PROXIES = [
  u=>`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`
];
const RAW_PROXIES = [
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`
];

/* ---------------- ORF headlines (RSS) ---------------- */
const ORF_FEED = "https://rss.orf.at/news.xml";
function stripTags(s){ const d=document.createElement("div"); d.innerHTML=s||""; return (d.textContent||"").replace(/\s+/g," ").trim(); }
function tidyCat(c){ return (c||"").replace(/^.*[\/:]/,"").trim() || "ORF"; }
function normItem(title,link,cat,desc,idx){
  return { id:idx+1, headline_de:stripTags(title).trim(), teaser_de:stripTags(desc).trim(), category_de:tidyCat(cat), url:(link||"").trim() };
}
function parseFeedXML(xml){
  const doc=new DOMParser().parseFromString(xml,"text/xml");
  const items=[...doc.querySelectorAll("item")];
  if(!items.length) throw new Error("no items");
  const tx=(n,s)=>{ const e=n.querySelector(s); return e?e.textContent:""; };
  return items.map((it,i)=>normItem(tx(it,"title"),tx(it,"link"),tx(it,"category")||tx(it,"subject"),tx(it,"description"),i));
}
async function fetchHeadlines(){
  let last;
  for(let i=0;i<PROXIES.length;i++){
    try{
      const res=await timeoutFetch(PROXIES[i](ORF_FEED),{},15000);
      if(!res.ok) throw new Error("HTTP "+res.status);
      if(i===0){ const j=await res.json(); if(j.status!=="ok"||!j.items||!j.items.length) throw new Error("empty"); return j.items.map((it,idx)=>normItem(it.title,it.link,(it.categories||[])[0],it.description,idx)); }
      if(i===1){ const j=await res.json(); return parseFeedXML(j.contents||""); }
      return parseFeedXML(await res.text());
    }catch(e){ last=e; }
  }
  throw last||new Error("all proxies failed");
}
async function fetchArticleText(url){
  if(!url) return "";
  for(let i=0;i<PROXIES.length;i++){
    try{
      const res=await timeoutFetch(PROXIES[i](url),{},15000); if(!res.ok) continue;
      let html;
      if(i===0){ continue; }
      else if(i===1){ const j=await res.json(); html=j.contents; }
      else { html=await res.text(); }
      const doc=new DOMParser().parseFromString(html||"","text/html");
      const ps=[...doc.querySelectorAll("p")].map(p=>p.textContent.trim()).filter(t=>t.length>45 && !/^\s*(Cookie|Datenschutz)/i.test(t));
      const joined=ps.join(" ").replace(/\s+/g," ").trim();
      if(joined.length>140) return joined.slice(0,2000);
    }catch(e){}
  }
  return "";
}

/* ---------------- translation (Google Translate, open) ---------------- */
function gURL(text,tl){ return `https://translate.googleapis.com/translate_a/single?client=gtx&sl=de&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`; }
function parseGoogle(j){ if(Array.isArray(j)&&Array.isArray(j[0])) return j[0].map(s=>s[0]).join(""); return ""; }
async function translate(text, tl){
  const g=gURL(text,tl);
  try{ const j=await fetchJSON(g,12000); const t=parseGoogle(j); if(t) return t; }catch(e){}
  for(const mk of RAW_PROXIES){ try{ const j=await fetchJSON(mk(g),14000); const t=parseGoogle(j); if(t) return t; }catch(e){} }
  try{ const m=await fetchJSON(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=de|${tl}`,12000); if(m&&m.responseData&&m.responseData.translatedText) return m.responseData.translatedText; }catch(e){}
  return "";
}

/* ---------------- German rules: sentences, cases, adjectives ---------------- */
function splitSentences(text){
  text=(text||"").replace(/\s+/g," ").trim();
  const parts = text.match(/[^.!?]+[.!?]+(?=\s|$)|[^.!?]+$/g) || (text?[text]:[]);
  return parts.map(s=>s.trim()).filter(s=>s.length>1).slice(0,9);
}
const CASE_OF = (()=>{
  const m={};
  const put=(arr,c)=>arr.forEach(w=>m[w]=c);
  put(["durch","für","gegen","ohne","um","bis","entlang","wider"],"Akkusativ");
  put(["aus","außer","bei","gegenüber","mit","nach","seit","von","zu","ab","laut","binnen"],"Dativ");
  put(["an","auf","hinter","in","neben","über","unter","vor","zwischen"],"Wechsel");
  put(["während","wegen","trotz","statt","anstatt","innerhalb","außerhalb","aufgrund","oberhalb","unterhalb"],"Genitiv");
  put(["ins","ans","aufs","durchs","fürs","ums"],"Akkusativ");
  put(["im","am","beim","vom","zum","zur","z35"],"Dativ");
  return m;
})();
function detectCases(sentences){
  const out=[]; const seenTrig={};
  sentences.forEach(s=>{
    const tokens=s.split(/(\s+)/);
    for(let i=0;i<tokens.length;i++){
      const raw=tokens[i]; const w=raw.toLowerCase().replace(/[^a-zäöüß]/g,"");
      if(CASE_OF[w]){
        const after=[]; for(let j=i+1;j<tokens.length && after.length<4;j++){ const t=tokens[j].trim(); if(!t) continue; if(/[.,;:!?]$/.test(t)){ after.push(t.replace(/[.,;:!?]+$/,"")); break;} after.push(t); }
        const phrase = raw.replace(/[^A-Za-zäöüÄÖÜß]/g,"") + " " + after.join(" ");
        out.push({trigger:w, display:raw.replace(/[^A-Za-zäöüÄÖÜß]/g,""), phrase:phrase.trim(), case:CASE_OF[w]});
        if(!seenTrig[w]) seenTrig[w]=CASE_OF[w];
      }
    }
  });
  return { list: out.slice(0,8), triggers: seenTrig };
}
const ADJ_STOP = new Set(["aber","oder","sondern","denn","wenn","dann","auch","schon","noch","sehr","mehr","immer","wieder","hier","oben","unten","gegen","neben","über","unter","während","wegen","ohne","gegenüber","gestern","heute","morgen","wie","wo","wer","der","die","das","den","dem","des","eine","einen","einem","einer","eines"]);
function detectAdjectives(sentences){
  const out=[]; const re=/\b(?:der|die|das|den|dem|des|ein|eine|einen|einem|einer|eines|seine[rmn]?|ihre[rmn]?|keine[rmn]?|diese[rmns]?)?\s*([a-zäöüß]{3,}(e|en|er|es|em))\s+([A-ZÄÖÜ][a-zäöüß]+)/g;
  sentences.forEach(s=>{ let m; re.lastIndex=0; while((m=re.exec(s))){ const adj=m[1], ending=m[2], noun=m[3]; if(ADJ_STOP.has(adj)) continue; out.push({adj, ending:"-"+ending, noun}); } });
  const seen=new Set(); return out.filter(a=>{ const k=a.adj+a.noun; if(seen.has(k))return false; seen.add(k); return true; }).slice(0,6);
}

/* ---------------- gender via Wiktionary (open) ---------------- */
const GENDER_CACHE={};
async function lookupGender(noun){
  const key=noun.toLowerCase();
  if(key in GENDER_CACHE) return GENDER_CACHE[key];
  try{
    const url=`https://de.wiktionary.org/w/api.php?action=parse&page=${encodeURIComponent(noun)}&prop=wikitext&format=json&origin=*`;
    const j=await fetchJSON(url,9000);
    const wt=j&&j.parse&&j.parse.wikitext&&j.parse.wikitext["*"];
    let g=null;
    if(wt && /\{\{Wortart\|Substantiv\|Deutsch\}\}/.test(wt)){
      const mm=wt.match(/Genus[^=]*=\s*([mfn])/);
      if(mm) g = mm[1]==="m"?"der":mm[1]==="f"?"die":"das";
    }
    GENDER_CACHE[key]=g; return g;
  }catch(e){ GENDER_CACHE[key]=null; return null; }
}
async function buildGenders(sentences){
  const caps=new Set();
  sentences.forEach(s=>{ (s.match(/[A-ZÄÖÜ][a-zäöüß]{2,}/g)||[]).forEach(w=>caps.add(w)); });
  const words=[...caps].slice(0,18);
  const results=await Promise.all(words.map(async w=>[w, await lookupGender(w)]));
  const map={}, nouns=[];
  results.forEach(([w,g])=>{ if(g){ map[w.toLowerCase()]=g; nouns.push({word:w, article:g}); } });
  return {map, nouns};
}

/* ---------------- gender colouring ---------------- */
let GENDER_MAP={};
function colourNouns(sentence){
  return sentence.replace(/([A-ZÄÖÜ][a-zäöüßA-ZÄÖÜ\-]+)/g,(m)=>{
    const art=GENDER_MAP[m.toLowerCase().replace(/[^a-zäöüß]/g,"")];
    return art ? `<span class="n ${art}">${m}</span>` : m;
  });
}

/* ---------------- speech ---------------- */
const synth=window.speechSynthesis;
let deVoice=null, voiceMissing=false, queue=[], qIndex=0, playing=false;
function pickVoice(){ const vs=synth.getVoices(); deVoice=vs.find(v=>v.lang==="de-DE")||vs.find(v=>v.lang&&v.lang.startsWith("de"))||null; voiceMissing=!deVoice; }
if(synth){ pickVoice(); synth.onvoiceschanged=pickVoice; }
function stopSpeech(){ if(synth)synth.cancel(); playing=false; queue=[]; qIndex=0; clearSpeakHighlight(); updatePlayBtn(); }
function clearSpeakHighlight(){ document.querySelectorAll(".srow.speaking").forEach(r=>r.classList.remove("speaking")); }
function speakOne(text){ if(!synth)return; synth.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang="de-DE"; u.rate=state.rate; if(deVoice)u.voice=deVoice; synth.speak(u); }
function playArticle(sentences){
  if(!synth)return;
  if(playing){ if(synth.paused)synth.resume(); else synth.pause(); updatePlayBtn(); return; }
  synth.cancel(); queue=sentences.slice(); qIndex=0; playing=true; updatePlayBtn(); speakNext();
}
function speakNext(){
  if(qIndex>=queue.length){ stopSpeech(); return; }
  clearSpeakHighlight();
  const row=document.querySelector(`.srow[data-i="${qIndex}"]`);
  if(row){ row.classList.add("speaking"); row.scrollIntoView({block:"nearest",behavior:"smooth"}); }
  const u=new SpeechSynthesisUtterance(queue[qIndex]); u.lang="de-DE"; u.rate=state.rate; if(deVoice)u.voice=deVoice;
  u.onend=()=>{ qIndex++; if(playing) speakNext(); }; synth.speak(u);
}
function updatePlayBtn(){
  const b=$("#playBtn"); if(!b)return;
  const paused=synth&&synth.paused;
  $("#playLabel").textContent = !playing ? T().listen : (paused?T().resume:T().pause);
  b.querySelector(".ic").innerHTML = (playing&&!paused)
    ? '<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
}

}

/* ---------------- reading area ---------------- */
function renderEmpty(){
  const t=T();
  $("#read").innerHTML=`<div class="empty"><h3 class="serif">${t.emptyH}</h3><p style="max-width:440px;margin:0 auto">${t.emptyP}</p>
    <div class="legend"><span><i class="swatch" style="background:var(--der)"></i>${t.masc}</span><span><i class="swatch" style="background:var(--die)"></i>${t.fem}</span><span><i class="swatch" style="background:var(--das)"></i>${t.neut}</span></div></div>`;
}
function errorBox(retryFn,msg,extra){
  const id="e"+Math.random().toString(36).slice(2), id2="e"+Math.random().toString(36).slice(2);
  setTimeout(()=>{ const b=document.getElementById(id); if(b)b.onclick=retryFn; if(extra){ const b2=document.getElementById(id2); if(b2)b2.onclick=extra.fn; } },0);
  return `<div class="errbox">${esc(msg||T().err)}<br><button class="ghost" id="${id}">${T().retry}</button>${extra?`<button class="ghost" id="${id2}" style="margin-left:8px">${esc(extra.label)}</button>`:""}</div>`;
}
function cacheKey(h){ return `${h.id}|${state.transLang}`; }

async function openArticle(h){
  state.activeId=h.id; renderHeadlines(); stopSpeech();
  const key=cacheKey(h);
  if(state.cache[key]){ GENDER_MAP=state.cache[key].genderMap||{}; paintArticle(h,state.cache[key]); return; }

  $("#read").innerHTML=`<div class="panel"><div class="art-head"><div class="art-cat">${esc(h.category_de||"")}</div><h1 class="art-title serif">${esc(h.headline_de||"")}</h1></div><div class="spinwrap"><span class="spin"></span>${T().loadingArt}</div></div>`;
  try{
    let src = h.body || await fetchArticleText(h.url);
    if(!src || src.length<80) src = (h.headline_de||"") + ". " + (h.teaser_de||"");
    const sentences = splitSentences(src);
    const cases = detectCases(sentences);
    const adjs = detectAdjectives(sentences);
    const bundle = { title_de:h.headline_de, sentences:sentences.map(s=>({de:s, tr:null})), cases, adjs, nouns:[], genderMap:{} };
    GENDER_MAP={}; state.cache[key]=bundle;
    paintArticle(h, bundle);

    // translations (fill progressively)
    sentences.forEach((s,i)=>{ translate(s, state.transLang).then(tr=>{ bundle.sentences[i].tr = tr || "—"; const cell=document.querySelector(`.s-tr[data-i="${i}"]`); if(cell && state.activeId===h.id){ cell.textContent=bundle.sentences[i].tr; cell.classList.remove("pending"); } }); });

    // gender (Wiktionary) then recolour + grammar/exercises
    buildGenders(sentences).then(({map,nouns})=>{
      bundle.genderMap=map; bundle.nouns=nouns; GENDER_MAP=map;
      if(state.activeId===h.id) paintArticle(h, bundle);
    });
  }catch(e){
    console.error(e);
    $("#read").innerHTML=errorBox(()=>openArticle(h), T().err);
  }
}

function paintArticle(h, bundle){
  const t=T();
  GENDER_MAP = bundle.genderMap||{};
  const rows=bundle.sentences.map((s,i)=>`
    <div class="srow" data-i="${i}">
      <div class="s-de serif">
        <button class="playbtn small mini" title="${esc(t.playSentence)}" data-speak="${i}" aria-label="${esc(t.playSentence)}"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        ${colourNouns(esc(s.de))}
      </div>
      <div class="s-tr ${s.tr==null?'pending':''}" data-i="${i}">${s.tr==null?esc(t.translating):esc(s.tr)}</div>
    </div>`).join("");
  const srcLink = h.url ? `<a href="${esc(h.url)}" target="_blank" rel="noopener">${t.openOrf} ↗</a>` : "";

  $("#read").innerHTML=`<div class="panel">
    <div class="art-head"><div class="art-cat">${esc(h.category_de||"")}</div><h1 class="art-title serif">${esc(bundle.title_de||h.headline_de||"")}</h1>${srcLink?`<p class="art-note" style="font-style:normal">${t.source}: ${srcLink}</p>`:""}</div>
    <div class="audiobar"><button class="playbtn" id="playBtn" aria-label="${esc(t.listen)}"><span class="ic"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span></button><span class="audio-label" id="playLabel">${t.listen}</span><label class="rate">${t.speed}<input type="range" min="0.6" max="1.2" step="0.05" value="${state.rate}" id="rate"></label></div>
    <div class="col-tags"><div style="flex:1">${t.colDe}</div><div style="flex:1">${t.colTr}</div></div>
    <div class="sentences" id="sentences">${rows}</div>
    <div class="tabs"><button class="tab ${state.tab==='gram'?'on':''}" data-tab="gram">${t.tabGram}</button><button class="tab ${state.tab==='ex'?'on':''}" data-tab="ex">${t.tabEx}</button></div>
    <div class="tabbody" id="tabbody"></div>
  </div>`;

  $("#playBtn").onclick=()=>playArticle(bundle.sentences.map(s=>s.de));
  $("#rate").oninput=(e)=>{ state.rate=parseFloat(e.target.value); };
  $("#sentences").querySelectorAll("[data-speak]").forEach(b=>{ b.onclick=()=>{ stopSpeech(); speakOne(bundle.sentences[+b.dataset.speak].de); }; });
  $("#tabbody").parentElement.querySelectorAll(".tab").forEach(tb=>{ tb.onclick=()=>{ state.tab=tb.dataset.tab; paintArticle(h,bundle); }; });
  updatePlayBtn();
  if(state.tab==="gram") renderGrammar($("#tabbody"), bundle); else renderExercises($("#tabbody"), bundle);
}

/* ---------- grammar ---------- */
function caseClassOf(c){ return {Akkusativ:"akk",Dativ:"dat",Wechsel:"wex",Genitiv:"gen"}[c]||"akk"; }
function caseExplain(w,c){
  const es={Akkusativ:`«${w}» siempre rige acusativo.`,Dativ:`«${w}» siempre rige dativo.`,Wechsel:`«${w}»: acusativo con movimiento (¿adónde?), dativo con ubicación (¿dónde?).`,Genitiv:`«${w}» rige genitivo.`};
  const en={Akkusativ:`“${w}” always takes the accusative.`,Dativ:`“${w}” always takes the dative.`,Wechsel:`“${w}”: accusative for movement, dative for location.`,Genitiv:`“${w}” takes the genitive.`};
  return (state.uiLang==="es"?es:en)[c];
}
function renderGrammar(body, bundle){
  const t=T();
  const nouns=(bundle.nouns||[]).map(n=>`<div class="ncard ${n.article}"><span class="art">${n.article}</span> <span class="word">${esc(n.word)}</span></div>`).join("");
  const cases=(bundle.cases.list||[]).map(c=>`<div class="gline"><span class="gphrase"><b>${esc(c.display)}</b> ${esc(c.phrase.replace(c.display,"").trim())}</span><span class="pill ${caseClassOf(c.case)}">${c.case}</span><div class="gexp">${esc(caseExplain(c.display,c.case))}</div></div>`).join("");
  const adjs=(bundle.adjs||[]).map(a=>`<div class="gline"><span class="gphrase">${esc(a.adj)} ${esc(a.noun)}</span><span class="gend">${esc(a.adj)} → ${esc(a.ending)}</span></div>`).join("");
  const declTable=`<table class="decl"><tr><th></th><th>der (m)</th><th>die (f)</th><th>das (n)</th><th>Plural</th></tr>
    <tr><th>Nom.</th><td>der gut<b>e</b></td><td>die gut<b>e</b></td><td>das gut<b>e</b></td><td>die gut<b>en</b></td></tr>
    <tr><th>Akk.</th><td>den gut<b>en</b></td><td>die gut<b>e</b></td><td>das gut<b>e</b></td><td>die gut<b>en</b></td></tr>
    <tr><th>Dat.</th><td>dem gut<b>en</b></td><td>der gut<b>en</b></td><td>dem gut<b>en</b></td><td>den gut<b>en</b></td></tr>
    <tr><th>Gen.</th><td>des gut<b>en</b></td><td>der gut<b>en</b></td><td>des gut<b>en</b></td><td>der gut<b>en</b></td></tr></table>`;
  body.innerHTML=`
    <div class="sec-label">${t.gNouns}</div><div class="hint">${esc(t.genNote)}</div><div class="ngrid">${nouns||"—"}</div>
    <div class="sec-label">${t.gCases}</div>${cases||"—"}
    <div class="sec-label">${t.gAdj}</div>
    ${adjs?`<div class="hint">${esc(t.adjFound)} · ${esc(t.autoNote)}</div>${adjs}`:""}
    <div class="hint" style="margin-top:14px">${esc(t.adjTable)}</div>${declTable}`;
}

/* ---------- exercises ---------- */
let exScore={correct:0,total:0};
function secLabel(txt){ return el("div","sec-label",txt+` <span class="scorechip" data-score></span>`); }
function feedbackEl(){ return el("div","feedback"); }
function updateScoreChips(){ document.querySelectorAll("[data-score]").forEach(s=>{ s.textContent = exScore.total?`${exScore.correct}/${exScore.total} ${T().score}`:""; }); }
function mcAnswer(btn,opts,isCorrect,answer,explanation,card){
  opts.querySelectorAll(".opt").forEach(b=>b.disabled=true);
  btn.classList.add(isCorrect?"correct":"wrong");
  if(!isCorrect) opts.querySelectorAll(".opt").forEach(b=>{ if(b.dataset.val===answer) b.classList.add("correct"); });
  const fb=card.querySelector(".feedback"); fb.className="feedback show "+(isCorrect?"good":"warn");
  fb.textContent=(isCorrect?T().correct:T().wrong)+(explanation?(" "+explanation):(isCorrect?"":(" "+answer)));
  exScore.total++; if(isCorrect)exScore.correct++; updateScoreChips();
}
function renderExercises(body, bundle){
  const t=T(); exScore={correct:0,total:0}; body.innerHTML="";

  // gender quiz
  const gNouns=(bundle.nouns||[]).slice(0,5);
  if(gNouns.length){
    body.appendChild(secLabel(t.exGender));
    gNouns.forEach(q=>{
      const card=el("div","ex");
      card.innerHTML=`<p class="ex-q"><strong>${esc(q.word)}</strong> &nbsp;<span style="font-size:13px;color:var(--muted)">${t.whichGender}</span></p>`;
      const opts=el("div","opts");
      ["der","die","das"].forEach(o=>{ const b=el("button","opt",o); b.dataset.val=o; b.onclick=()=>mcAnswer(b,opts,o===q.article,q.article,null,card); opts.appendChild(b); });
      card.appendChild(opts); card.appendChild(feedbackEl()); body.appendChild(card);
    });
  }

  // case quiz (Akk/Dativ triggers only)
  const trig=Object.entries(bundle.cases.triggers||{}).filter(([w,c])=>c==="Akkusativ"||c==="Dativ").slice(0,4);
  if(trig.length){
    body.appendChild(secLabel(t.exCases));
    trig.forEach(([w,c])=>{
      const card=el("div","ex");
      card.innerHTML=`<p class="ex-q"><span class="de">«${esc(w)}»</span> &nbsp;<span style="font-size:13px;color:var(--muted)">${t.whichCase}</span></p>`;
      const opts=el("div","opts");
      ["Akkusativ","Dativ"].forEach(o=>{ const b=el("button","opt",o); b.dataset.val=o; b.onclick=()=>mcAnswer(b,opts,o===c,c,caseExplain(w,c),card); opts.appendChild(b); });
      card.appendChild(opts); card.appendChild(feedbackEl()); body.appendChild(card);
    });
  }

  // reverse translation
  const transItems=bundle.sentences.filter(s=>s.tr && s.tr!=="—" && s.tr!=null).slice(0,3);
  if(transItems.length){
    body.appendChild(secLabel(t.exTrans));
    transItems.forEach(s=>{
      const card=el("div","ex");
      card.innerHTML=`<p class="ex-q">${t.promptTrans} <em>${esc(s.tr)}</em></p>`;
      const ta=el("textarea","trans"); ta.placeholder=t.yourAnswer;
      const btn=el("button","ghost reveal",t.reveal);
      const ans=el("div","model-answer",`<span class="lab">${t.model}</span>${esc(s.de)}`);
      btn.onclick=()=>ans.classList.add("show");
      card.appendChild(ta); card.appendChild(btn); card.appendChild(ans); body.appendChild(card);
    });
  }
  if(!body.children.length) body.innerHTML=`<div class="hint">—</div>`;
  updateScoreChips();
}

/* ---------------- controls ---------------- */
function applyI18N(){
  const t=T();
  document.documentElement.lang=state.uiLang;
  $("#tagline").textContent=t.tagline;
  $("#lblUi").textContent=t.ui; $("#lblTrans").textContent=t.trans; $("#refreshLbl").textContent=t.refresh;
  $("#feedTitle").textContent=t.feed; $("#feedDate").textContent=todayHuman;
  $("#footer").innerHTML=t.note + (voiceMissing?("<br>"+t.noVoice):"");
}
function bindSeg(id,key,after){ $(id).querySelectorAll("button").forEach(b=>{ b.onclick=()=>{ $(id).querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); state[key]=b.dataset.ui||b.dataset.tr; after&&after(); }; }); }
function rerenderCurrent(){
  applyI18N(); if(state.headlines) renderHeadlines();
  if(state.activeId==null){ renderEmpty(); return; }
  const h=(state.headlines||[]).find(x=>x.id===state.activeId); const b=h&&state.cache[cacheKey(h)];
  if(h&&b){ GENDER_MAP=b.genderMap||{}; paintArticle(h,b);} else renderEmpty();
}
function reloadCurrentArticle(){ if(state.activeId==null)return; const h=(state.headlines||[]).find(x=>x.id===state.activeId); if(h) openArticle(h); }
function init(){
  applyI18N();
  bindSeg("#uiSeg","uiLang",()=>{ applyI18N(); rerenderCurrent(); });
  bindSeg("#transSeg","transLang",()=>{ reloadCurrentArticle(); });
  $("#refreshBtn").onclick=()=>{ state.cache={}; state.activeId=null; loadHeadlines(); };
  loadHeadlines();
}
window.addEventListener("beforeunload", stopSpeech);
init();
</script>
</body>
</html>
