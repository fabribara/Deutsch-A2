<style>
  :root{
    --paper:#FBFAF7; --paper-2:#F3F1EA; --ink:#1A1A18; --muted:#6B6B62;
    --line:#E3E0D6; --line-strong:#CFCBBE; --at-red:#C8102E;
    --der:#2563EB; --der-bg:#E8EFFD; --die:#D6206E; --die-bg:#FCE7F0; --das:#15803D; --das-bg:#E4F4E9;
    --ok:#15803D; --ok-bg:#E4F4E9; --bad:#C8102E; --bad-bg:#FBE7EA;
    --shadow:0 1px 2px rgba(26,26,24,.04), 0 8px 24px rgba(26,26,24,.06); --radius:14px;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{background:var(--paper); color:var(--ink); font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif; font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .serif{font-family:"Newsreader",Georgia,serif} button{font-family:inherit; cursor:pointer} ::selection{background:#FBE7EA}
  header.topbar{position:sticky; top:0; z-index:20; background:rgba(251,250,247,.88); backdrop-filter:blur(8px); border-bottom:1px solid var(--line);}
  .topwrap{max-width:1240px; margin:0 auto; padding:14px 22px; display:flex; align-items:center; gap:18px; flex-wrap:wrap}
  .brand{display:flex; align-items:baseline; gap:10px; margin-right:auto}
  .mark{font-family:"Newsreader",serif; font-weight:600; font-size:30px; letter-spacing:-.01em; line-height:1;} .mark .dot{color:var(--at-red)}
  .tagline{font-size:12.5px; color:var(--muted); letter-spacing:.02em}
  .controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .seg{display:inline-flex; background:var(--paper-2); border:1px solid var(--line); border-radius:999px; padding:3px}
  .seg button{border:0; background:transparent; color:var(--muted); font-size:13px; font-weight:600; padding:6px 12px; border-radius:999px;}
  .seg button.on{background:#fff; color:var(--ink); box-shadow:var(--shadow)}
  .ctl-label{font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); margin-right:2px}
  .ghost{border:1px solid var(--line-strong); background:#fff; color:var(--ink); border-radius:999px; padding:8px 14px; font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:7px;}
  .ghost:hover{border-color:var(--ink)} .ghost svg{width:15px;height:15px}
  .shell{max-width:1240px; margin:0 auto; padding:22px; display:grid; grid-template-columns:320px 1fr; gap:24px; align-items:start}
  @media(max-width:920px){ .shell{grid-template-columns:1fr; padding:16px} }
  aside.feed{position:sticky; top:84px} @media(max-width:920px){ aside.feed{position:static} }
  .feed-head{display:flex; align-items:baseline; justify-content:space-between; margin:2px 4px 12px}
  .feed-head h2{font-family:"Newsreader",serif; font-weight:600; font-size:20px; margin:0}
  .feed-date{font-size:12px; color:var(--muted)}
  .hlist{display:flex; flex-direction:column; gap:8px; max-height:calc(100vh - 150px); overflow:auto; padding-right:4px}
  @media(max-width:920px){ .hlist{max-height:none} }
  .hcard{text-align:left; width:100%; background:#fff; border:1px solid var(--line); border-radius:12px; padding:13px 14px; transition:.15s;}
  .hcard:hover{border-color:var(--line-strong); transform:translateY(-1px)} .hcard.active{border-color:var(--at-red); box-shadow:0 0 0 1px var(--at-red) inset}
  .hcat{font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--at-red); font-weight:700}
  .htitle{font-family:"Newsreader",serif; font-size:17px; line-height:1.25; margin:4px 0 4px; font-weight:500}
  .hteaser{font-size:12.5px; color:var(--muted); line-height:1.4}
  main.read{min-height:60vh}
  .empty{background:#fff; border:1px dashed var(--line-strong); border-radius:var(--radius); padding:48px 36px; text-align:center; color:var(--muted);}
  .empty h3{font-family:"Newsreader",serif; color:var(--ink); font-size:24px; margin:0 0 8px; font-weight:500}
  .legend{display:inline-flex; gap:16px; margin-top:22px; flex-wrap:wrap; justify-content:center}
  .legend span{display:inline-flex; align-items:center; gap:7px; font-size:13px; color:var(--ink)}
  .swatch{width:13px; height:13px; border-radius:4px; display:inline-block}
  .panel{background:#fff; border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
  .art-head{padding:24px 28px 18px; border-bottom:1px solid var(--line)}
  .art-cat{font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--at-red); font-weight:700}
  .art-title{font-family:"Newsreader",serif; font-weight:600; font-size:30px; line-height:1.15; margin:8px 0 0}
  @media(max-width:560px){ .art-title{font-size:24px} }
  .art-note{margin:12px 0 0; font-size:12.5px; color:var(--muted)}
  .audiobar{display:flex; align-items:center; gap:12px; padding:14px 28px; background:var(--paper-2); border-bottom:1px solid var(--line); flex-wrap:wrap}
  .playbtn{border:0; background:var(--at-red); color:#fff; border-radius:999px; width:42px; height:42px; display:grid; place-items:center; flex:0 0 auto;}
  .playbtn svg{width:18px;height:18px;fill:#fff} .playbtn.small{width:28px;height:28px;background:transparent;color:var(--muted)}
  .playbtn.small svg{width:15px;height:15px;fill:var(--muted)} .playbtn.small:hover svg{fill:var(--at-red)}
  .audio-label{font-size:13px; font-weight:600} .rate{display:flex; align-items:center; gap:8px; margin-left:auto; font-size:12px; color:var(--muted)} .rate input{accent-color:var(--at-red)}
  .sentences{padding:6px 0}
  .srow{display:grid; grid-template-columns:1fr 1fr; gap:22px; padding:14px 28px; border-bottom:1px solid var(--line); align-items:start;}
  @media(max-width:680px){ .srow{grid-template-columns:1fr; gap:6px} }
  .srow:last-child{border-bottom:0} .srow.speaking{background:#FFFCF4}
  .s-de{font-family:"Newsreader",serif; font-size:19px; line-height:1.5; position:relative;}
  .s-de .mini{position:absolute; left:-26px; top:3px}
  @media(max-width:680px){ .s-de .mini{position:static; margin-right:6px; display:inline-flex; vertical-align:middle} }
  .s-tr{font-size:15px; color:#4A4A42; line-height:1.55; padding-top:2px} .s-tr.pending{color:var(--muted); font-style:italic}
  .col-tags{display:flex; gap:18px; padding:10px 28px 2px; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted)}
  @media(max-width:680px){ .col-tags{display:none} }
  .n{font-weight:500; border-radius:4px; padding:0 2px}
  .n.der{color:var(--der); background:var(--der-bg)} .n.die{color:var(--die); background:var(--die-bg)} .n.das{color:var(--das); background:var(--das-bg)}
  .tabs{display:flex; gap:4px; padding:16px 28px 0; border-top:1px solid var(--line); background:#fff}
  .tab{border:0; background:transparent; padding:10px 4px; margin-right:20px; font-size:14px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent}
  .tab.on{color:var(--ink); border-bottom-color:var(--at-red)}
  .tabbody{padding:20px 28px 30px}
  @media(max-width:560px){ .art-head,.audiobar,.srow,.col-tags,.tabs,.tabbody{padding-left:18px;padding-right:18px} }
  .sec-label{font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:700; margin:22px 0 10px} .sec-label:first-child{margin-top:0}
  .hint{font-size:12px;color:var(--muted);margin:-4px 0 10px;font-style:italic}
  .ngrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px}
  .ncard{border:1px solid var(--line); border-radius:11px; padding:11px 13px}
  .ncard .art{font-weight:700; font-size:13px} .ncard .word{font-family:"Newsreader",serif; font-size:18px; font-weight:500}
  .ncard .meta{font-size:12px; color:var(--muted); margin-top:3px}
  .ncard.der{border-color:#BFD3FB} .ncard.der .art{color:var(--der)} .ncard.die{border-color:#F6C3DA} .ncard.die .art{color:var(--die)} .ncard.das{border-color:#BFE5C9} .ncard.das .art{color:var(--das)}
  .gline{padding:11px 0; border-bottom:1px solid var(--line)} .gline:last-child{border-bottom:0}
  .gphrase{font-family:"Newsreader",serif; font-size:18px} .gphrase b{color:var(--at-red); font-weight:600}
  .pill{display:inline-block; font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; margin-left:8px; vertical-align:middle}
  .pill.akk{background:#FFF1E6; color:#B45309} .pill.dat{background:#EEF2FF; color:#4338CA} .pill.wex{background:#F3EEFF; color:#6D28D9} .pill.gen{background:#FDF2F8; color:#9D174D} .pill.nom{background:#ECFDF5; color:#047857}
  .gexp{font-size:13px; color:var(--muted); margin-top:4px} .gend{display:inline-block; background:var(--paper-2); border:1px solid var(--line); border-radius:6px; padding:1px 7px; font-weight:600; font-size:13px; color:var(--at-red)}
  table.decl{width:100%; border-collapse:collapse; font-size:13.5px; margin-top:6px}
  table.decl th, table.decl td{border:1px solid var(--line); padding:6px 9px; text-align:left} table.decl th{background:var(--paper-2); font-weight:600; font-size:12px} table.decl td b{color:var(--at-red)}
  .ex{border:1px solid var(--line); border-radius:12px; padding:15px 16px; margin-bottom:12px}
  .ex-q{font-size:15px; margin:0 0 11px} .ex-q .de{font-family:"Newsreader",serif; font-size:18px} .ex-q .gap{border-bottom:2px solid var(--at-red); padding:0 16px; margin:0 2px}
  .opts{display:flex; gap:8px; flex-wrap:wrap}
  .opt{border:1px solid var(--line-strong); background:#fff; border-radius:9px; padding:8px 14px; font-size:14px; font-weight:600; transition:.12s;}
  .opt:hover:not(:disabled){border-color:var(--ink)} .opt:disabled{cursor:default}
  .opt.correct{background:var(--ok-bg); border-color:var(--ok); color:var(--ok)} .opt.wrong{background:var(--bad-bg); border-color:var(--bad); color:var(--bad)}
  .feedback{font-size:13px; margin-top:10px; padding:9px 12px; border-radius:8px; display:none}
  .feedback.show{display:block} .feedback.good{background:var(--ok-bg); color:#0f5a2c} .feedback.warn{background:var(--bad-bg); color:#8c0c20}
  textarea.trans{width:100%; border:1px solid var(--line-strong); border-radius:9px; padding:10px 12px; font-family:inherit; font-size:15px; resize:vertical; min-height:54px}
  textarea.trans:focus{outline:2px solid var(--at-red); outline-offset:1px; border-color:var(--at-red)}
  .reveal{margin-top:9px} .model-answer{display:none; margin-top:9px; padding:10px 12px; background:var(--das-bg); border-radius:8px; font-size:15px; font-family:"Newsreader",serif}
  .model-answer.show{display:block} .model-answer .lab{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--das); font-weight:700; display:block; margin-bottom:3px; font-family:"Inter",sans-serif}
  .scorechip{font-size:12px; font-weight:700; color:var(--muted); float:right}
  .skel{background:linear-gradient(90deg,#efece4 25%,#f6f4ee 50%,#efece4 75%); background-size:200% 100%; animation:sh 1.3s infinite; border-radius:6px}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  @media (prefers-reduced-motion: reduce){ .skel{animation:none} *{transition:none!important} }
  .spinwrap{display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px; padding:18px 28px}
  .spin{width:16px;height:16px;border:2px solid var(--line-strong);border-top-color:var(--at-red);border-radius:50%;animation:rot .8s linear infinite} @keyframes rot{to{transform:rotate(360deg)}}
  .errbox{background:var(--bad-bg); border:1px solid #F0C5CC; color:#8c0c20; border-radius:10px; padding:14px 16px; margin:16px 28px; font-size:14px}
  .errbox code{background:#fff; padding:1px 5px; border-radius:4px; font-size:12.5px} .errbox button{margin-top:10px}
  .footer{max-width:1240px;margin:0 auto;padding:8px 22px 60px;color:var(--muted);font-size:11.5px;line-height:1.5}
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  /* visible status bar */
  .statusbar{font-size:12.5px; padding:10px 28px; border-bottom:1px solid var(--line); line-height:1.5}
  .statusbar b{font-weight:700}
  .statusbar.ok{background:var(--ok-bg); color:#0f5a2c}
  .statusbar.warn{background:#FFF6E6; color:#8a5a00}
  .statusbar.err{background:var(--bad-bg); color:#8c0c20}
  @media(max-width:560px){ .statusbar{padding-left:18px;padding-right:18px} }
  /* diagnostics log */
  .logpanel{position:fixed; left:0; right:0; bottom:0; z-index:60; background:#1c1c1a; color:#e8e6df; border-top:2px solid var(--at-red); max-height:48vh; display:flex; flex-direction:column}
  .logpanel[hidden]{display:none}
  .loghead{display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid #333; font-size:12px; flex-wrap:wrap}
  .loghead .ttl{font-weight:700; margin-right:auto}
  .loghead button{background:#2a2a27; color:#e8e6df; border:1px solid #444; border-radius:8px; padding:5px 11px; font-size:12px; font-weight:600}
  .loghead label{display:flex;align-items:center;gap:6px}
  #logBody{overflow:auto; padding:8px 14px; font-size:11.5px; line-height:1.55; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .logline{white-space:pre-wrap; word-break:break-word}
  .logline.ok{color:#7ee29a} .logline.err{color:#ff9a9a} .logline.warn{color:#ffcf8f} .logline.info{color:#9fc7ff}
</style>
</head>

  <div class="topwrap">

      <span class="ctl-label" id="lblUi"></span>

      <div class="seg" id="transSeg"><button data-tr="es" class="on">Español</button><button data-tr="en">English</button></div>
      <button class="ghost" id="logBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/><path d="M4 4h16v16H4z" opacity=".25"/></svg><span id="logLbl"></span></button>
      <button class="ghost" id="refreshBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg><span id="refreshLbl"></span></button>

</header>

<div class="shell">

</div>

<div class="footer" id="footer"></div>

<div class="logpanel" id="logPanel" hidden>
  <div class="loghead">
    <span class="ttl" id="logTitle"></span>
    <label><input type="checkbox" id="llmToggle" checked> <span id="llmLbl"></span></label>
    <button id="logCopy"></button>
    <button id="logClose">✕</button>
  </div>
  <div id="logBody"></div>
</div>

<script>
/* Lernblatt — daily ORF news as a German study session.
   Open + key-free: ORF RSS (news) · Pollinations LLM (analysis, optional) ·
   Google Translate / MyMemory (translation) · Wiktionary (gender) ·
   browser speech (audio) · rule-based case detection. All steps logged. */

/* ---------------- diagnostics log ---------------- */
const LOG=[];
function log(level,msg){ LOG.push({t:new Date().toLocaleTimeString(),level,msg:String(msg)}); if(LOG.length>300)LOG.shift(); renderLog(); }
function renderLog(){ const b=document.getElementById("logBody"); if(!b||document.getElementById("logPanel").hidden)return; b.innerHTML=LOG.slice(-120).map(l=>`<div class="logline ${l.level}">[${l.t}] ${escp(l.msg)}</div>`).join(""); b.scrollTop=b.scrollHeight; }
const escp = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
window.addEventListener("error", e=>log("err","JS error: "+(e.message||e)+(e.filename?(" @"+e.filename+":"+e.lineno):"")));
window.addEventListener("unhandledrejection", e=>log("err","Unhandled promise: "+((e.reason&&e.reason.message)||e.reason)));

const I18N={

function sampleData(lang){

/* ---------------- networking ---------------- */
function timeoutFetch(url,opts,ms){ const c=new AbortController(); const id=setTimeout(()=>c.abort(),ms||15000); return fetch(url,Object.assign({},opts,{signal:c.signal})).finally(()=>clearTimeout(id)); }
async function fetchJSON(url,ms){ const r=await timeoutFetch(url,{},ms); if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); }

const PROXIES=[ u=>`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}`, u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, u=>`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}` ];
const PROXY_NAMES=["rss2json","allorigins","codetabs"];
const RAW_PROXIES=[ u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`, u=>`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}` ];

const ORF_FEED="https://rss.orf.at/news.xml";
function stripTags(s){ const d=document.createElement("div"); d.innerHTML=s||""; return (d.textContent||"").replace(/\s+/g," ").trim(); }
function tidyCat(c){ return (c||"").replace(/^.*[\/:]/,"").trim()||"ORF"; }
function normItem(title,link,cat,desc,idx){ return {id:idx+1,headline_de:stripTags(title).trim(),teaser_de:stripTags(desc).trim(),category_de:tidyCat(cat),url:(link||"").trim()}; }
function parseFeedXML(xml){ const doc=new DOMParser().parseFromString(xml,"text/xml"); const items=[...doc.querySelectorAll("item")]; if(!items.length) throw new Error("no <item> in feed"); const tx=(n,s)=>{const e=n.querySelector(s);return e?e.textContent:"";}; return items.map((it,i)=>normItem(tx(it,"title"),tx(it,"link"),tx(it,"category")||tx(it,"subject"),tx(it,"description"),i)); }
async function fetchHeadlines(){
  let last;
  for(let i=0;i<PROXIES.length;i++){
    try{
      log("info","Feed via "+PROXY_NAMES[i]+" …");
      const res=await timeoutFetch(PROXIES[i](ORF_FEED),{},15000);
      if(!res.ok) throw new Error("HTTP "+res.status);
      let items;
      if(i===0){ const j=await res.json(); if(j.status!=="ok"||!j.items||!j.items.length) throw new Error("rss2json status="+j.status); items=j.items.map((it,idx)=>normItem(it.title,it.link,(it.categories||[])[0],it.description,idx)); }
      else if(i===1){ const j=await res.json(); items=parseFeedXML(j.contents||""); }
      else { items=parseFeedXML(await res.text()); }
      log("ok","Feed OK via "+PROXY_NAMES[i]+": "+items.length+" headlines");
      return items;
    }catch(e){ log("warn","Feed via "+PROXY_NAMES[i]+" failed: "+e.message); last=e; }
  }
  throw last||new Error("all feed proxies failed");
}
async function fetchArticleText(url){
  if(!url) return "";
  for(let i=1;i<PROXIES.length;i++){
    try{
      const res=await timeoutFetch(PROXIES[i](url),{},15000); if(!res.ok) throw new Error("HTTP "+res.status);
      let html; if(i===1){ const j=await res.json(); html=j.contents; } else { html=await res.text(); }
      const doc=new DOMParser().parseFromString(html||"","text/html");
      const ps=[...doc.querySelectorAll("p")].map(p=>p.textContent.trim()).filter(t=>t.length>45);
      const joined=ps.join(" ").replace(/\s+/g," ").trim();
      if(joined.length>140){ log("ok","Article body via "+PROXY_NAMES[i]+": "+joined.length+" chars"); return joined.slice(0,2000); }
      log("warn","Article body via "+PROXY_NAMES[i]+": too short ("+joined.length+")");
    }catch(e){ log("warn","Article body via "+PROXY_NAMES[i]+" failed: "+e.message); }
  }
  return "";
}

/* ---------------- LLM (Pollinations, key-free) ---------------- */
async function callLLM(prompt){
  const res=await timeoutFetch("https://text.pollinations.ai/openai",{ method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ model:"openai", messages:[{role:"system",content:"You output only raw valid JSON, no markdown."},{role:"user",content:prompt}], temperature:0.2, referrer:"lernblatt" }) }, 60000);
  if(res.status===429) throw new Error("rate-limited (429; anon tier ~1 req/15s)");
  if(!res.ok) throw new Error("HTTP "+res.status);
  const data=await res.json();
  const txt=data&&data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;
  if(!txt) throw new Error("empty content");
  return txt.trim();
}
function extractJSON(text){
  let t=(text||"").trim().replace(/^```(?:json)?/i,"").replace(/```\s*$/,"").trim();
  try{ return JSON.parse(t); }catch(e){}
  const oi=t.indexOf("{"), ai=t.indexOf("[");
  let start=-1,close; if(ai!==-1&&(oi===-1||ai<oi)){start=ai;close="]";} else if(oi!==-1){start=oi;close="}";}
  if(start===-1) throw new Error("no JSON in response");
  return JSON.parse(t.slice(start,t.lastIndexOf(close)+1));
}
function articleLLMPrompt(src){
  const L=state.transLang==="es"?"Spanish":"English";
  return `Du bist Deutschlehrer. Lerner: Muttersprache ${L}, Niveau A2-B1. Deutscher ORF-Text:
"""${src.slice(0,1400)}"""
Antworte NUR mit gültigem JSON (keine Markdown-Zäune) in genau dieser Form:
{"title_de":"...","sentences":[{"de":"kurzer Satz","tr":"Übersetzung auf ${L}"}],
"nouns":[{"word":"Substantiv","article":"der|die|das","meaning":"auf ${L}"}],
"cases":[{"phrase":"Phrase","case":"Akkusativ|Dativ|Nominativ|Genitiv","explanation":"kurz auf ${L}"}],
"adjectives":[{"phrase":"Phrase","adjective":"Adj","ending":"-e/-en/-es","explanation":"kurz auf ${L}"}],
"exercises":{"gender":[{"word":"Substantiv","answer":"der|die|das"}],
"cases":[{"prompt":"Satz/Präposition","options":["Akkusativ","Dativ"],"answer":"...","explanation":"auf ${L}"}],
"declension":[{"sentence":"Satz mit ___","options":["4 Formen"],"answer":"Form","explanation":"auf ${L}"}],
"translation":[{"prompt":"Satz auf ${L}","answer":"deutscher Satz"}]}}
6-8 Sätze, bis 8 nouns, 3-4 Übungen je Typ. Nur Wörter aus dem Text.`;
}

/* ---------------- translation (Google Translate / MyMemory) ---------------- */
function gURL(text,tl){ return `https://translate.googleapis.com/translate_a/single?client=gtx&sl=de&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`; }
function parseGoogle(j){ return (Array.isArray(j)&&Array.isArray(j[0]))? j[0].map(s=>s[0]).join(""):""; }
async function translate(text,tl){
  const g=gURL(text,tl);
  try{ const j=await fetchJSON(g,12000); const t=parseGoogle(j); if(t) return {text:t,via:"Google"}; }catch(e){ }
  for(let i=0;i<RAW_PROXIES.length;i++){ try{ const j=await fetchJSON(RAW_PROXIES[i](g),14000); const t=parseGoogle(j); if(t) return {text:t,via:"Google·proxy"}; }catch(e){ } }
  try{ const m=await fetchJSON(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=de|${tl}`,12000); if(m&&m.responseData&&m.responseData.translatedText) return {text:m.responseData.translatedText,via:"MyMemory"}; }catch(e){ }
  return {text:"",via:null};
}

/* ---------------- German rules ---------------- */
function splitSentences(text){ text=(text||"").replace(/\s+/g," ").trim(); const p=text.match(/[^.!?]+[.!?]+(?=\s|$)|[^.!?]+$/g)||(text?[text]:[]); return p.map(s=>s.trim()).filter(s=>s.length>1).slice(0,9); }
const CASE_OF=(()=>{ const m={}; const put=(a,c)=>a.forEach(w=>m[w]=c);
  put(["durch","für","gegen","ohne","um","bis","entlang","wider"],"Akkusativ");
  put(["aus","außer","bei","gegenüber","mit","nach","seit","von","zu","ab","laut","binnen"],"Dativ");
  put(["an","auf","hinter","in","neben","über","unter","vor","zwischen"],"Wechsel");
  put(["während","wegen","trotz","statt","anstatt","innerhalb","außerhalb","aufgrund"],"Genitiv");
  put(["ins","ans","aufs","durchs","fürs","ums"],"Akkusativ"); put(["im","am","beim","vom","zum","zur"],"Dativ"); return m; })();
function detectCases(sentences){ const out=[],trig={};
  sentences.forEach(s=>{ const tk=s.split(/(\s+)/);
    for(let i=0;i<tk.length;i++){ const w=tk[i].toLowerCase().replace(/[^a-zäöüß]/g,""); if(CASE_OF[w]){ const after=[]; for(let j=i+1;j<tk.length&&after.length<4;j++){ const t=tk[j].trim(); if(!t)continue; if(/[.,;:!?]$/.test(t)){after.push(t.replace(/[.,;:!?]+$/,""));break;} after.push(t);} const disp=tk[i].replace(/[^A-Za-zäöüÄÖÜß]/g,""); out.push({display:disp,phrase:(disp+" "+after.join(" ")).trim(),case:CASE_OF[w]}); if(!trig[w])trig[w]=CASE_OF[w]; } } });
  return {list:out.slice(0,8),triggers:trig}; }
const ADJ_STOP=new Set(["aber","oder","sondern","denn","wenn","dann","auch","schon","noch","sehr","mehr","immer","wieder","hier","gegen","neben","über","unter","während","wegen","ohne","gegenüber","wie","wo","der","die","das","den","dem","des","eine","einen","einem","einer","eines"]);
function detectAdjectives(sentences){ const out=[],seen=new Set(); const re=/\b(?:der|die|das|den|dem|des|ein|eine|einen|einem|einer|eines|seine[rmn]?|ihre[rmn]?|keine[rmn]?|diese[rmns]?)?\s*([a-zäöüß]{3,}(e|en|er|es|em))\s+([A-ZÄÖÜ][a-zäöüß]+)/g;
  sentences.forEach(s=>{ let m; re.lastIndex=0; while((m=re.exec(s))){ if(ADJ_STOP.has(m[1]))continue; const k=m[1]+m[3]; if(seen.has(k))continue; seen.add(k); out.push({adj:m[1],noun:m[3],ending:"-"+m[2],phrase:m[1]+" "+m[3],explanation:""}); } });
  return out.slice(0,6); }

/* ---------------- gender via Wiktionary ---------------- */
const GENDER_CACHE={};
async function lookupGender(noun){ const key=noun.toLowerCase(); if(key in GENDER_CACHE)return GENDER_CACHE[key];
  try{ const j=await fetchJSON(`https://de.wiktionary.org/w/api.php?action=parse&page=${encodeURIComponent(noun)}&prop=wikitext&format=json&origin=*`,9000);
    const wt=j&&j.parse&&j.parse.wikitext&&j.parse.wikitext["*"]; let g=null;
    if(wt&&/\{\{Wortart\|Substantiv\|Deutsch\}\}/.test(wt)){ const mm=wt.match(/Genus[^=]*=\s*([mfn])/); if(mm) g=mm[1]==="m"?"der":mm[1]==="f"?"die":"das"; }
    GENDER_CACHE[key]=g; return g;
  }catch(e){ GENDER_CACHE[key]=null; return null; } }
async function buildGenders(sentences){ const caps=new Set(); sentences.forEach(s=>{(s.match(/[A-ZÄÖÜ][a-zäöüß]{2,}/g)||[]).forEach(w=>caps.add(w));});
  const words=[...caps].slice(0,18);
  const res=await Promise.all(words.map(async w=>[w,await lookupGender(w)]));
  const map={},nouns=[]; res.forEach(([w,g])=>{ if(g){ map[w.toLowerCase().replace(/[^a-zäöüß]/g,"")]=g; nouns.push({word:w,article:g,meaning:""}); } });
  log("info","Wiktionary gender: "+nouns.length+"/"+words.length+" found"); return {map,nouns}; }

function bundleFromLLM(j,h){

function bundleFromRules(sentences,cases,adjs,nouns,h){

    cases:cases.list.map(c=>({display:c.display,phrase:c.phrase,case:c.case,explanation:caseExplain(c.display,c.case)})),
    adjs:adjs,

         cases:Object.entries(cases.triggers).filter(([w,c])=>c==="Akkusativ"||c==="Dativ").slice(0,4).map(([w,c])=>({prompt:"«"+w+"»",options:["Akkusativ","Dativ"],answer:c,explanation:caseExplain(w,c)})),

async function openArticle(h){
  state.activeId=h.id; renderHeadlines(); stopSpeech();
  const key=cacheKey(h);
  if(state.cache[key]){ GENDER_MAP=state.cache[key].genderMap||{}; paintArticle(h,state.cache[key]); return; }
  shellLoading(h,T().loadingArt);
  log("info","── Opening: "+h.headline_de);
  const warns=[];
  const warn=(level,msg)=>{ warns.push({level,msg}); log(level,msg); };
  try{
    let src=h.body||"";
    if(!src){ src=await fetchArticleText(h.url); }
    if(!src||src.length<80){ src=(h.headline_de||"")+". "+(h.teaser_de||""); warn("warn", T().wNoBody); }

    if(state.useLLM){
      try{
        setStatus(T().aiWorking); log("info","LLM → text.pollinations.ai");
        const raw=await callLLM(articleLLMPrompt(src)); log("ok","LLM responded ("+raw.length+" chars)");
        const j=extractJSON(raw); const bundle=bundleFromLLM(j,h);
        if(!bundle.sentences.length) throw new Error("JSON had no sentences");
        bundle.warnings=warns; bundle.engineNote=T().engAI;
        log("ok","AI: "+bundle.sentences.length+" sentences, "+bundle.nouns.length+" nouns");
        GENDER_MAP=bundle.genderMap||{}; state.cache[key]=bundle; paintArticle(h,bundle); return;
      }catch(e){ warn("warn", T().wLLM+" "+e.message); setStatus(T().aiFallback); }
    } else {
      warn("warn", T().wLLMoff);
    }

    // open-API fallback: translation + Wiktionary + rules
    const sentences=splitSentences(src);
    const cases=detectCases(sentences), adjs=detectAdjectives(sentences);
    const bundle=bundleFromRules(sentences,cases,adjs,[],h);
    bundle.warnings=warns; bundle.engineNote=T().engOpen;
    GENDER_MAP={}; state.cache[key]=bundle; paintArticle(h,bundle);

    log("info","Translating "+sentences.length+" sentences…");
    const settle=await Promise.all(sentences.map((s,i)=> translate(s,state.transLang).then(r=>{
      bundle.sentences[i].tr = r.text || null;
      const cell=document.querySelector(`.s-tr[data-i="${i}"]`);
      if(cell&&state.activeId===h.id){ cell.classList.remove("pending"); if(r.text){ cell.textContent=r.text; } else { cell.innerHTML=`<span style="color:var(--bad)">⚠ ${esc(T().trFail)}</span>`; } }
      return r;
    })));
    const used=[...new Set(settle.map(r=>r.via).filter(Boolean))];
    const failed=settle.filter(r=>!r.via).length;
    if(used.length) warn("info", T().wTransVia+" "+used.join(", "));
    if(failed) warn("err", failed+" "+T().wTransFail);
    if(!used.length && failed) warn("err", T().wTransAll);

    buildGenders(sentences).then(({map,nouns})=>{
      bundle.genderMap=map; bundle.nouns=nouns; bundle.ex.gender=nouns.slice(0,5).map(n=>({word:n.word,answer:n.article})); GENDER_MAP=map;
      if(!nouns.length) warn("warn", T().wGender);
      if(state.activeId===h.id) paintArticle(h,bundle);
    });
    updateStatusBar(bundle);
  }catch(e){
    warn("err","Article load failed: "+e.message);
    $("#read").innerHTML=errorBox(()=>openArticle(h), T().err+" — "+e.message);
  }
}

function paintArticle(h,bundle){
  const t=T(); GENDER_MAP=bundle.genderMap||{};
  const rows=bundle.sentences.map((s,i)=>`<div class="srow" data-i="${i}"><div class="s-de serif"><button class="playbtn small mini" title="${esc(t.playSentence)}" data-speak="${i}" aria-label="${esc(t.playSentence)}"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>${colourNouns(esc(s.de))}</div><div class="s-tr ${s.tr==null?'pending':''}" data-i="${i}">${s.tr==null?esc(t.translating):esc(s.tr)}</div></div>`).join("");
  const srcLink=h.url?`<a href="${esc(h.url)}" target="_blank" rel="noopener">${t.openOrf} ↗</a>`:"";
  const badge = bundle.source==="ai" ? "AI" : "open APIs";
  $("#read").innerHTML=`<div class="panel"><div class="art-head"><div class="art-cat">${esc(h.category_de||"")} · ${badge}</div><h1 class="art-title serif">${esc(bundle.title_de||h.headline_de||"")}</h1>${srcLink?`<p class="art-note">${t.source}: ${srcLink}</p>`:""}</div>${statusBarHTML(bundle)}
    <div class="audiobar"><button class="playbtn" id="playBtn" aria-label="${esc(t.listen)}"><span class="ic"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span></button><span class="audio-label" id="playLabel">${t.listen}</span><label class="rate">${t.speed}<input type="range" min="0.6" max="1.2" step="0.05" value="${state.rate}" id="rate"></label></div>
    <div class="col-tags"><div style="flex:1">${t.colDe}</div><div style="flex:1">${t.colTr}</div></div>
    <div class="sentences" id="sentences">${rows}</div>
    <div class="tabs"><button class="tab ${state.tab==='gram'?'on':''}" data-tab="gram">${t.tabGram}</button><button class="tab ${state.tab==='ex'?'on':''}" data-tab="ex">${t.tabEx}</button></div>
    <div class="tabbody" id="tabbody"></div></div>`;
  $("#playBtn").onclick=()=>playArticle(bundle.sentences.map(s=>s.de));
  $("#rate").oninput=e=>{ state.rate=parseFloat(e.target.value); };
  $("#sentences").querySelectorAll("[data-speak]").forEach(b=>{ b.onclick=()=>{ stopSpeech(); speakOne(bundle.sentences[+b.dataset.speak].de); }; });
  $("#tabbody").parentElement.querySelectorAll(".tab").forEach(tb=>{ tb.onclick=()=>{ state.tab=tb.dataset.tab; paintArticle(h,bundle); }; });
  updatePlayBtn();
  if(state.tab==="gram") renderGrammar($("#tabbody"),bundle); else renderExercises($("#tabbody"),bundle);
}

/* ---------- visible status bar ---------- */
function statusBarHTML(bundle){
  if(!bundle) return "";
  const w=bundle.warnings||[];
  const cls = w.some(x=>x.level==="err")?"err":(w.some(x=>x.level==="warn")?"warn":"ok");
  const parts=[`<b>${esc(bundle.engineNote||"")}</b>`].concat(w.map(x=>esc(x.msg)));
  return `<div class="statusbar ${cls}" id="statusBar">${parts.join(" · ")}</div>`;
}
function updateStatusBar(bundle){
  const cur=$("#statusBar"); if(!cur)return;
  const tmp=document.createElement("div"); tmp.innerHTML=statusBarHTML(bundle);
  if(tmp.firstChild) cur.replaceWith(tmp.firstChild);
}

/* ---------- grammar ---------- */
function caseClassOf(c){ return {Akkusativ:"akk",Dativ:"dat",Wechsel:"wex",Genitiv:"gen",Nominativ:"nom"}[c]||"nom"; }
function caseExplain(w,c){ const es={Akkusativ:`«${w}» rige acusativo.`,Dativ:`«${w}» rige dativo.`,Wechsel:`«${w}»: acusativo con movimiento, dativo con ubicación.`,Genitiv:`«${w}» rige genitivo.`,Nominativ:`Nominativo.`}; const en={Akkusativ:`“${w}” takes the accusative.`,Dativ:`“${w}” takes the dative.`,Wechsel:`“${w}”: accusative for movement, dative for location.`,Genitiv:`“${w}” takes the genitive.`,Nominativ:`Nominative.`}; return (state.uiLang==="es"?es:en)[c]||""; }
function renderGrammar(body,bundle){ const t=T();
  const nouns=(bundle.nouns||[]).map(n=>`<div class="ncard ${n.article}"><span class="art">${n.article}</span> <span class="word">${esc(n.word)}</span>${n.meaning?`<div class="meta">${esc(n.meaning)}</div>`:""}</div>`).join("");
  const cases=(bundle.cases||[]).map(c=>{ const disp=c.display?`<b>${esc(c.display)}</b> ${esc(c.phrase.replace(c.display,"").trim())}`:esc(c.phrase); return `<div class="gline"><span class="gphrase">${disp}</span><span class="pill ${caseClassOf(c.case)}">${esc(c.case)}</span>${c.explanation?`<div class="gexp">${esc(c.explanation)}</div>`:""}</div>`; }).join("");
  const adjs=(bundle.adjs||[]).map(a=>`<div class="gline"><span class="gphrase">${esc(a.phrase||(a.adj+" "+a.noun))}</span><span class="gend">${esc(a.adj)} → ${esc(a.ending)}</span>${a.explanation?`<div class="gexp">${esc(a.explanation)}</div>`:""}</div>`).join("");
  const declTable=`<table class="decl"><tr><th></th><th>der (m)</th><th>die (f)</th><th>das (n)</th><th>Plural</th></tr>
    <tr><th>Nom.</th><td>der gut<b>e</b></td><td>die gut<b>e</b></td><td>das gut<b>e</b></td><td>die gut<b>en</b></td></tr>
    <tr><th>Akk.</th><td>den gut<b>en</b></td><td>die gut<b>e</b></td><td>das gut<b>e</b></td><td>die gut<b>en</b></td></tr>
    <tr><th>Dat.</th><td>dem gut<b>en</b></td><td>der gut<b>en</b></td><td>dem gut<b>en</b></td><td>den gut<b>en</b></td></tr>
    <tr><th>Gen.</th><td>des gut<b>en</b></td><td>der gut<b>en</b></td><td>des gut<b>en</b></td><td>der gut<b>en</b></td></tr></table>`;
  body.innerHTML=`<div class="sec-label">${t.gNouns}</div>${bundle.source==="open"?`<div class="hint">${esc(t.genNote)}</div>`:""}<div class="ngrid">${nouns||"—"}</div>
    <div class="sec-label">${t.gCases}</div>${cases||"—"}
    <div class="sec-label">${t.gAdj}</div>${adjs?`<div class="hint">${esc(t.autoNote)}</div>${adjs}`:""}<div class="hint" style="margin-top:14px">${esc(t.adjTable)}</div>${declTable}`;
}

/* ---------- exercises ---------- */
let exScore={correct:0,total:0};
function secLabel(txt){ return el("div","sec-label",txt+` <span class="scorechip" data-score></span>`); }
function feedbackEl(){ return el("div","feedback"); }
function updateScoreChips(){ document.querySelectorAll("[data-score]").forEach(s=>{ s.textContent=exScore.total?`${exScore.correct}/${exScore.total} ${T().score}`:""; }); }
function mcAnswer(btn,opts,isC,answer,expl,card){ opts.querySelectorAll(".opt").forEach(b=>b.disabled=true); btn.classList.add(isC?"correct":"wrong"); if(!isC) opts.querySelectorAll(".opt").forEach(b=>{ if(b.dataset.val===answer) b.classList.add("correct"); }); const fb=card.querySelector(".feedback"); fb.className="feedback show "+(isC?"good":"warn"); fb.textContent=(isC?T().correct:T().wrong)+(expl?(" "+expl):(isC?"":(" "+answer))); exScore.total++; if(isC)exScore.correct++; updateScoreChips(); }
function mcBlock(body,label,items,getOpts,getAns,getPrompt,getExpl){ if(!items.length)return; body.appendChild(secLabel(label)); items.forEach(q=>{ const card=el("div","ex"); card.innerHTML=`<p class="ex-q">${getPrompt(q)}</p>`; const opts=el("div","opts"); getOpts(q).forEach(o=>{ const b=el("button","opt",esc(o)); b.dataset.val=o; b.onclick=()=>mcAnswer(b,opts,o===getAns(q),getAns(q),getExpl(q),card); opts.appendChild(b); }); card.appendChild(opts); card.appendChild(feedbackEl()); body.appendChild(card); }); }
function renderExercises(body,bundle){ const t=T(); exScore={correct:0,total:0}; body.innerHTML="";
  mcBlock(body,t.exGender,(bundle.ex.gender||[]).slice(0,5),()=>["der","die","das"],q=>q.answer,q=>`<strong>${esc(q.word)}</strong> &nbsp;<span style="font-size:13px;color:var(--muted)">${t.whichGender}</span>`,()=>"");
  mcBlock(body,t.exCases,(bundle.ex.cases||[]).slice(0,4),q=>q.options||["Akkusativ","Dativ"],q=>q.answer,q=>`<span class="de">${esc(q.prompt)}</span> &nbsp;<span style="font-size:13px;color:var(--muted)">${t.whichCase}</span>`,q=>q.explanation||"");
  mcBlock(body,t.exDecl,(bundle.ex.declension||[]).slice(0,3),q=>q.options||[],q=>q.answer,q=>`<span class="de">${esc((q.sentence||"").replace(/_+/g,'<span class="gap">?</span>'))}</span>`,q=>q.explanation||"");
  let transItems=bundle.ex.translation||[]; if(!transItems.length) transItems=bundle.sentences.filter(s=>s.tr&&s.tr!=="⚠"&&s.tr!=null).slice(0,3).map(s=>({prompt:s.tr,answer:s.de}));
  if(transItems.length){ body.appendChild(secLabel(t.exTrans)); transItems.forEach(s=>{ const card=el("div","ex"); card.innerHTML=`<p class="ex-q">${t.promptTrans} <em>${esc(s.prompt)}</em></p>`; const ta=el("textarea","trans"); ta.placeholder=t.yourAnswer; const btn=el("button","ghost reveal",t.reveal); const ans=el("div","model-answer",`<span class="lab">${t.model}</span>${esc(s.answer)}`); btn.onclick=()=>ans.classList.add("show"); card.appendChild(ta); card.appendChild(btn); card.appendChild(ans); body.appendChild(card); }); }
  if(!body.children.length) body.innerHTML=`<div class="hint">—</div>`;
  updateScoreChips();
}

/* ---------------- controls + log ---------------- */
function applyI18N(){ const t=T(); document.documentElement.lang=state.uiLang;
  $("#tagline").textContent=t.tagline; $("#lblUi").textContent=t.ui; $("#lblTrans").textContent=t.trans; $("#refreshLbl").textContent=t.refresh; $("#logLbl").textContent=t.logLbl;
  $("#feedTitle").textContent=t.feed; $("#feedDate").textContent=todayHuman; $("#logTitle").textContent=t.logTitle; $("#llmLbl").textContent=t.llmLbl; $("#logCopy").textContent=t.logCopy;
  $("#footer").innerHTML=t.note+(voiceMissing?("<br>"+t.noVoice):""); }
function bindSeg(id,key,after){ $(id).querySelectorAll("button").forEach(b=>{ b.onclick=()=>{ $(id).querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); state[key]=b.dataset.ui||b.dataset.tr; after&&after(); }; }); }
function rerenderCurrent(){ applyI18N(); if(state.headlines) renderHeadlines(); if(state.activeId==null){ renderEmpty(); return; } const h=(state.headlines||[]).find(x=>x.id===state.activeId); const b=h&&state.cache[cacheKey(h)]; if(h&&b){GENDER_MAP=b.genderMap||{};paintArticle(h,b);} else renderEmpty(); }
function reloadCurrentArticle(){ if(state.activeId==null)return; const h=(state.headlines||[]).find(x=>x.id===state.activeId); if(h) openArticle(h); }
function toggleLog(force){ const p=$("#logPanel"); p.hidden = force===true?false:(force===false?true:!p.hidden); if(!p.hidden) renderLog(); }
function init(){ applyI18N();
  bindSeg("#uiSeg","uiLang",()=>{ applyI18N(); rerenderCurrent(); });
  bindSeg("#transSeg","transLang",()=>{ reloadCurrentArticle(); });
  $("#refreshBtn").onclick=()=>{ state.cache={}; state.activeId=null; log("info","Refreshing headlines"); loadHeadlines(); };
  $("#logBtn").onclick=()=>toggleLog();
  $("#logClose").onclick=()=>toggleLog(false);
  $("#llmToggle").onchange=e=>{ state.useLLM=e.target.checked; log("info","Use AI = "+state.useLLM); reloadCurrentArticle(); };
  $("#logCopy").onclick=async()=>{ const txt=LOG.map(l=>`[${l.t}] ${l.level.toUpperCase()} ${l.msg}`).join("\n"); try{ await navigator.clipboard.writeText(txt); $("#logCopy").textContent="✓"; setTimeout(()=>$("#logCopy").textContent=T().logCopy,1200); }catch(e){ const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); } };
  log("info","Lernblatt started · "+location.href);
  loadHeadlines();
}
window.addEventListener("beforeunload", stopSpeech);
init();
</script>
