<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netzplan A2 · Studyguide Kapitel 7–12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAFAF7; --ink:#161616; --line:#DCDCD6; --muted:#6B6B66;
  --u1:#E2002A; --u2:#9462A6; --u3:#F07C00; --u4:#009A3D; --u5:#00B5AD; --u6:#9E6B2E;
  --ok:#009A3D; --bad:#E2002A; --amber:#F5A800;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--paper);color:var(--ink);font-family:'Public Sans',system-ui,sans-serif;min-height:100svh;}
.shell{max-width:660px;margin:0 auto;padding:20px 18px 60px;}

/* header */
.tophead{display:flex;align-items:center;gap:12px;border-bottom:4px solid var(--ink);padding-bottom:14px;margin-bottom:18px;}
.netz{display:grid;grid-template-columns:1fr 1fr;gap:3px;flex:none;}
.netz i{width:14px;height:14px;border-radius:3px;display:block;}
.tophead h1{font-family:'Archivo',sans-serif;font-stretch:115%;font-weight:800;font-size:clamp(20px,5.4vw,27px);line-height:1.05;}
.tophead .sub{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;}
.backbtn{font-family:'Spline Sans Mono',monospace;font-size:12.5px;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px 0;margin-bottom:8px;display:none;}
.backbtn:before{content:"← ";}

/* home: line list */
.linecard{
  display:flex;align-items:stretch;gap:0;width:100%;text-align:left;
  background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;
  margin-bottom:12px;cursor:pointer;font:inherit;
  transition:transform .08s, box-shadow .15s;
  box-shadow:0 1px 3px rgba(20,20,20,.04);
}
.linecard:active{transform:scale(.985);}
.linecard .rail{width:10px;flex:none;}
.linecard .body{padding:15px 16px;flex:1;}
.linecard .row1{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
.linecard .ub{color:#fff;font-family:'Archivo',sans-serif;font-weight:900;font-size:14px;padding:2px 8px;border-radius:4px;}
.linecard .kap{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--muted);}
.linecard h2{font-family:'Archivo',sans-serif;font-stretch:108%;font-weight:800;font-size:17.5px;}
.linecard .topics{font-size:13px;color:var(--muted);line-height:1.45;margin-top:4px;}
.linecard .prog{margin-top:9px;height:6px;background:var(--paper);border:1px solid var(--line);border-radius:3px;overflow:hidden;}
.linecard .prog i{display:block;height:100%;border-radius:3px;transition:width .4s;}
.linecard .pct{font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:var(--muted);margin-top:4px;}
.examcard{background:var(--ink);color:#fff;border:none;}
.examcard .topics{color:#C9C9C4;}
.examcard h2{color:#fff;}

/* chapter view */
.chap-head{border-radius:13px;padding:18px;color:#fff;margin-bottom:14px;}
.chap-head .ub{background:rgba(255,255,255,.22);font-family:'Archivo',sans-serif;font-weight:900;font-size:14px;padding:2px 9px;border-radius:4px;}
.chap-head h2{font-family:'Archivo',sans-serif;font-stretch:112%;font-weight:800;font-size:23px;margin-top:8px;}
.chap-head .ct{font-size:13.5px;opacity:.92;margin-top:4px;line-height:1.5;}

details.spick{background:#fff;border:1px solid var(--line);border-radius:13px;margin-bottom:14px;overflow:hidden;}
details.spick summary{
  list-style:none;cursor:pointer;padding:14px 16px;
  font-family:'Archivo',sans-serif;font-stretch:108%;font-weight:800;font-size:15px;
  display:flex;justify-content:space-between;align-items:center;
}
details.spick summary::-webkit-details-marker{display:none;}
details.spick summary:after{content:"+";font-size:20px;color:var(--muted);}
details.spick[open] summary:after{content:"–";}
.spick-body{padding:0 16px 16px;font-size:14px;line-height:1.6;}
.spick-body h4{font-size:13px;margin:14px 0 5px;font-family:'Spline Sans Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:500;}
.spick-body h4:first-child{margin-top:0;}
.spick-body table{width:100%;border-collapse:collapse;font-size:13.5px;margin:6px 0;}
.spick-body td,.spick-body th{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top;}
.spick-body th{background:var(--paper);font-weight:600;}
.spick-body .es{color:var(--muted);font-style:italic;}
.spick-body b{font-weight:700;}
.spick-body code{font-family:'Spline Sans Mono',monospace;font-size:12.5px;background:var(--paper);padding:1px 5px;border-radius:4px;}

/* exercise cards */
.excard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:18px 16px;margin-bottom:13px;box-shadow:0 1px 3px rgba(20,20,20,.04);}
.excard .num{font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.07em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.excard .num .badge{font-size:14px;}
.excard .q{font-size:16.5px;font-weight:600;line-height:1.5;margin-bottom:13px;}
.excard .q .gap{display:inline-block;min-width:56px;border-bottom:2.5px solid var(--amber);text-align:center;}
.excard .hint{font-size:12.5px;color:var(--muted);margin:-7px 0 12px;font-style:italic;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{
  text-align:left;font:inherit;font-size:15.5px;font-weight:500;
  background:var(--paper);border:2px solid var(--line);border-radius:10px;
  padding:11px 14px;cursor:pointer;transition:all .15s;touch-action:manipulation;
}
.opt:active{transform:scale(.985);}
.opt.correct{border-color:var(--ok);background:#EDF8F0;}
.opt.wrong{border-color:var(--bad);background:#FCEDEF;}
.opt.dim{opacity:.45;}
.opt:disabled{cursor:default;}

.gaprow{display:flex;gap:8px;}
.gapinput{
  flex:1;font:inherit;font-size:16px;padding:11px 13px;
  border:2px solid var(--line);border-radius:10px;background:var(--paper);
  min-width:0;
}
.gapinput:focus{outline:none;border-color:var(--amber);}
.gapinput.good{border-color:var(--ok);background:#EDF8F0;}
.gapinput.nope{border-color:var(--bad);background:#FCEDEF;}
.checkbtn{
  font-family:'Archivo',sans-serif;font-weight:800;font-size:14px;
  background:var(--ink);color:#fff;border:none;border-radius:10px;
  padding:0 18px;cursor:pointer;flex:none;touch-action:manipulation;
}

/* builder */
.built{
  min-height:48px;border:2px dashed var(--line);border-radius:10px;
  padding:8px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;
  align-items:center;
}
.built.good{border-style:solid;border-color:var(--ok);background:#EDF8F0;}
.built.nope{border-style:solid;border-color:var(--bad);background:#FCEDEF;}
.pool{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.chiptok{
  font:inherit;font-size:15px;font-weight:500;
  background:var(--paper);border:2px solid var(--line);border-radius:8px;
  padding:7px 11px;cursor:pointer;touch-action:manipulation;
}
.built .chiptok{background:#fff;}
.chiptok:active{transform:scale(.95);}
.chiptok.used{opacity:.25;pointer-events:none;}
.buildrow{display:flex;gap:8px;}
.ghostbtn{
  font-family:'Archivo',sans-serif;font-weight:800;font-size:14px;
  background:transparent;color:var(--ink);border:2px solid var(--line);
  border-radius:10px;padding:9px 16px;cursor:pointer;touch-action:manipulation;
}

/* match */
.matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mitem{
  font:inherit;font-size:13.5px;font-weight:500;line-height:1.4;text-align:left;
  background:var(--paper);border:2px solid var(--line);border-radius:10px;
  padding:10px 11px;cursor:pointer;transition:all .15s;touch-action:manipulation;
}
.mitem.sel{border-color:var(--amber);background:#FFF7E6;}
.mitem.locked{border-color:var(--ok);background:#EDF8F0;opacity:.75;pointer-events:none;}
.mitem.flash{border-color:var(--bad);background:#FCEDEF;}

.explain{
  margin-top:13px;border-left:4px solid var(--ok);background:#F2F9F4;
  border-radius:0 10px 10px 0;padding:11px 13px;font-size:13.5px;line-height:1.55;
  animation:slidein .25s ease;
}
.explain.bad{border-left-color:var(--bad);background:#FBF1F2;}
.explain .es{display:block;margin-top:5px;color:var(--muted);font-style:italic;}
@keyframes slidein{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

.chapfoot{
  background:#fff;border:1px solid var(--line);border-radius:13px;
  padding:16px;text-align:center;font-size:14.5px;line-height:1.6;
}
.chapfoot .big{font-family:'Archivo',sans-serif;font-stretch:115%;font-weight:900;font-size:30px;}

/* exam */
.exam-progress{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;}
.exam-bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:16px;}
.exam-bar i{display:block;height:100%;background:var(--ink);transition:width .4s;}
.btn-primary{
  font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;
  background:var(--ink);color:#fff;border:none;border-radius:10px;
  padding:13px 26px;cursor:pointer;touch-action:manipulation;
}
.nextrow{display:flex;justify-content:flex-end;margin-top:14px;}
.score-hero{font-family:'Archivo',sans-serif;font-stretch:120%;font-weight:900;font-size:clamp(42px,13vw,60px);line-height:1;}
.hidden{display:none!important;}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>

   <h4>Formen</h4>

   <tr><td>ich/er/sie <b>sollte</b></td><td>wir/sie/Sie <b>sollten</b></td></tr>

  {t:"build",q:"Schreib den Tipp mit sollte: (Sie – vor Prüfungen tief durchatmen)",w:["Sie","sollten","vor","Prüfungen","tief","durchatmen."],

  {t:"build",q:"Schreib den Tipp mit sollte: (Leon – nicht so streng zu sich sein)",w:["Leon","sollte","nicht","so","streng","zu","sich","sein."],

 ]},

  {t:"deshalb / trotzdem & zwei Objekte",h:`
   <h4>Sätze verbinden</h4>

   </table>

   <tr><th>Mit Pronomen (Akk.)</th><td>Akkusativ-Pronomen zuerst:<br><code>Sie gibt <b>es</b> (A) <b>ihnen</b> (D).</code></td></tr>
   </table>
   <p><span class="es">Con dos sustantivos: dativo primero. Si el acusativo es pronombre: el pronombre va primero.</span></p>`}

/* ============ STATE ============ */
const progress = {}; // chapId -> {done:Set(idx), correct:Set(idx)}
CH.forEach(c=>progress[c.id]={done:new Set(),correct:new Set()});

const $=id=>document.getElementById(id);
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function norm(s){return s.toLowerCase().trim().replace(/\s+/g," ").replace(/[.!?,]+$/,"");}

/* ============ HOME ============ */
function renderHome(){
  $("backBtn").style.display="none";
  $("chapView").classList.add("hidden");
  $("examView").classList.add("hidden");
  const home=$("home");home.classList.remove("hidden");home.innerHTML="";
  CH.forEach(c=>{
    const p=progress[c.id], total=c.ex.length;
    const pct=Math.round(p.done.size/total*100);
    const card=el("button","linecard");
    card.innerHTML=`
      <div class="rail" style="background:${c.hex}"></div>
      <div class="body">
        <div class="row1"><span class="ub" style="background:${c.hex}">${c.line}</span><span class="kap">Kapitel ${c.id}</span></div>
        <h2>${c.name}</h2>
        <div class="topics">${c.topics}</div>
        <div class="prog"><i style="background:${c.hex};width:${pct}%"></i></div>
        <div class="pct">${p.done.size}/${total} Übungen · ${p.correct.size} richtig</div>
      </div>`;
    card.onclick=()=>renderChapter(c);
    home.appendChild(card);
  });
  const exam=el("button","linecard examcard");
  exam.innerHTML=`
    <div class="rail" style="background:linear-gradient(180deg,#E2002A,#9462A6,#F07C00,#009A3D,#00B5AD,#9E6B2E)"></div>
    <div class="body">
      <div class="row1"><span class="ub" style="background:rgba(255,255,255,.2)">★</span><span class="kap" style="color:#C9C9C4">Prüfungsmodus</span></div>
      <h2>Große Testfahrt</h2>
      <div class="topics">15 zufällige Fragen aus allen Kapiteln — wie in der echten Prüfung.</div>
    </div>`;
  exam.onclick=startExam;
  home.appendChild(exam);
}

/* ============ EXERCISE RENDERERS ============ */
function makeExplain(ok,q){
  const ex=el("div","explain"+(ok?"":" bad"));
  ex.innerHTML=(ok?"✅ <b>Richtig!</b> ":"❌ <b>Leider nein.</b> ")+(q.de||"")+(q.es?'<span class="es">🇪🇸 '+q.es+"</span>":"");
  return ex;
}

function renderExercise(c,q,idx,onDone){
  const card=el("div","excard");
  const typeLabel={mc:"Auswahl",gap:"Lücke",build:"Satzbau",match:"Zuordnen"}[q.t];
  card.appendChild(el("div","num",`<span>Übung ${idx+1} · ${typeLabel}</span><span class="badge" data-b></span>`));
  const badge=card.querySelector("[data-b]");
  const fin=(ok)=>{badge.textContent=ok?"✅":"❌";onDone&&onDone(ok);};

  if(q.t==="mc"){
    card.appendChild(el("div","q",q.q.replace("___",'<span class="gap">___</span>')));
    const box=el("div","opts");card.appendChild(box);
    shuffle(q.o.map((o,i)=>({o,i}))).forEach(({o,i})=>{
      const b=el("button","opt",o);
      b.onclick=()=>{
        [...box.children].forEach(x=>{x.disabled=true;
          if(x.textContent===q.o[q.a])x.classList.add("correct");
          else if(x===b)x.classList.add("wrong");
          else x.classList.add("dim");});
        const ok=i===q.a;
        card.appendChild(makeExplain(ok,q));fin(ok);
      };
      box.appendChild(b);
    });
  }

  else if(q.t==="gap"){
    card.appendChild(el("div","q",q.q.replace("___",'<span class="gap">___</span>')));
    if(q.hint)card.appendChild(el("div","hint","💡 "+q.hint));
    const row=el("div","gaprow");
    const inp=document.createElement("input");
    inp.className="gapinput";inp.type="text";inp.autocomplete="off";inp.autocapitalize="off";
    inp.placeholder="Deine Antwort …";
    const btn=el("button","checkbtn","OK");
    let tries=0;
    const check=()=>{
      if(!inp.value.trim())return;
      const ok=q.ans.some(a=>norm(a)===norm(inp.value));
      tries++;
      if(ok){
        inp.className="gapinput good";inp.disabled=true;btn.disabled=true;
        card.appendChild(makeExplain(true,q));fin(true);
      }else if(tries>=2){
        inp.className="gapinput nope";inp.disabled=true;btn.disabled=true;
        const ex=makeExplain(false,q);
        ex.innerHTML="❌ <b>Die Lösung:</b> „"+q.ans[0]+"“ — "+(q.de||"")+(q.es?'<span class="es">🇪🇸 '+q.es+"</span>":"");
        card.appendChild(ex);fin(false);
      }else{
        inp.className="gapinput nope";
        if(!card.querySelector(".hint2"))card.appendChild(el("div","hint hint2","Noch nicht ganz — ein zweiter Versuch!"));
      }
    };
    btn.onclick=check;
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")check();});
    inp.addEventListener("input",()=>{if(!inp.disabled)inp.className="gapinput";});
    row.appendChild(inp);row.appendChild(btn);card.appendChild(row);
  }

  else if(q.t==="build"){
    card.appendChild(el("div","q",q.q));
    const built=el("div","built");
    const pool=el("div","pool");
    card.appendChild(built);card.appendChild(pool);
    let seq=[];
    const chips=shuffle(q.w.map((w,i)=>({w,i})));
    chips.forEach(({w,i})=>{
      const b=el("button","chiptok",w);
      b.onclick=()=>{
        if(b.classList.contains("used"))return;
        b.classList.add("used");seq.push({w,i,src:b});
        const placed=el("button","chiptok",w);
        placed.onclick=()=>{
          const k=seq.findIndex(s=>s.src===b);
          if(k>-1){seq.splice(k,1);b.classList.remove("used");placed.remove();}
        };
        built.appendChild(placed);
      };
      pool.appendChild(b);
    });
    const row=el("div","buildrow");
    const chk=el("button","checkbtn","Prüfen");
    const rst=el("button","ghostbtn","Zurücksetzen");
    let tries=0;
    chk.onclick=()=>{
      if(seq.length!==q.w.length)return;
      const ok=seq.every((s,k)=>s.w===q.w[k]);
      tries++;
      if(ok){
        built.className="built good";chk.disabled=true;rst.disabled=true;
        [...built.children].forEach(x=>x.onclick=null);
        card.appendChild(makeExplain(true,q));fin(true);
      }else if(tries>=2){
        built.className="built nope";chk.disabled=true;rst.disabled=true;
        const ex=makeExplain(false,q);
        ex.innerHTML="❌ <b>Richtige Reihenfolge:</b> „"+q.w.join(" ")+"“ — "+(q.de||"")+(q.es?'<span class="es">🇪🇸 '+q.es+"</span>":"");
        card.appendChild(ex);fin(false);
      }else{
        built.className="built nope";
        setTimeout(()=>built.className="built",700);
      }
    };
    rst.onclick=()=>{
      seq=[];built.innerHTML="";built.className="built";
      [...pool.children].forEach(x=>x.classList.remove("used"));
    };
    row.appendChild(chk);row.appendChild(rst);card.appendChild(row);
  }

  else if(q.t==="match"){
    card.appendChild(el("div","q",q.q));
    const grid=el("div","matchgrid");card.appendChild(grid);
    const left=q.pairs.map((p,i)=>({txt:p[0],pair:i,side:"L"}));
    const right=shuffle(q.pairs.map((p,i)=>({txt:p[1],pair:i,side:"R"})));
    let sel=null,locked=0,errors=0;
    const all=[];
    function make(item){
      const b=el("button","mitem",item.txt);
      b.onclick=()=>{
        if(b.classList.contains("locked"))return;
        if(!sel){sel={item,b};b.classList.add("sel");return;}
        if(sel.b===b){b.classList.remove("sel");sel=null;return;}
        if(sel.item.side===item.side){sel.b.classList.remove("sel");sel={item,b};b.classList.add("sel");return;}
        // attempt pair
        if(sel.item.pair===item.pair){
          sel.b.classList.remove("sel");
          sel.b.classList.add("locked");b.classList.add("locked");
          locked++;sel=null;
          if(locked===q.pairs.length){
            const ok=errors===0;
            card.appendChild(makeExplain(ok,{de:ok?"Alle Paare gefunden — ohne Fehler!":"Alle Paare gefunden, aber mit "+errors+" Fehlversuch(en). Schau dir die Paare noch einmal an.",es:ok?"¡Todas las parejas a la primera!":"Completado con algunos intentos fallidos."}));
            fin(ok);
          }
        }else{
          errors++;
          sel.b.classList.remove("sel");
          sel.b.classList.add("flash");b.classList.add("flash");
          const a=sel.b;sel=null;
          setTimeout(()=>{a.classList.remove("flash");b.classList.remove("flash");},550);
        }
      };
      all.push(b);return b;
    }
    // interleave rows: left[i], right[i]
    for(let i=0;i<q.pairs.length;i++){grid.appendChild(make(left[i]));grid.appendChild(make(right[i]));}
  }

  return card;
}

/* ============ CHAPTER VIEW ============ */
function renderChapter(c){
  $("home").classList.add("hidden");
  $("examView").classList.add("hidden");
  $("backBtn").style.display="block";
  const v=$("chapView");v.classList.remove("hidden");v.innerHTML="";

  const head=el("div","chap-head");
  head.style.background=c.hex;
  head.innerHTML=`<span class="ub">${c.line}</span><h2>Kapitel ${c.id} · ${c.name}</h2><div class="ct">${c.topics}</div>`;
  v.appendChild(head);

  c.notes.forEach(n=>{
    const d=el("details","spick");
    d.innerHTML=`<summary>📋 Spickzettel: ${n.t}</summary><div class="spick-body">${n.h}</div>`;
    v.appendChild(d);
  });

  const foot=el("div","chapfoot");
  const updateFoot=()=>{
    const p=progress[c.id];
    foot.innerHTML=`<div class="big" style="color:${c.hex}">${p.correct.size} / ${c.ex.length}</div>
    <div>richtig beantwortet (${p.done.size} von ${c.ex.length} gemacht)</div>`;
  };

  c.ex.forEach((q,i)=>{
    v.appendChild(renderExercise(c,q,i,(ok)=>{
      progress[c.id].done.add(i);
      if(ok)progress[c.id].correct.add(i);
      updateFoot();
    }));
  });

  updateFoot();
  v.appendChild(foot);
  window.scrollTo({top:0});
}

/* ============ EXAM ============ */
let examQ=[],examIdx=0,examScore=0;
function startExam(){
  $("home").classList.add("hidden");
  $("chapView").classList.add("hidden");
  $("backBtn").style.display="block";
  const pool=[];
  CH.forEach(c=>c.ex.forEach(q=>{if(q.t!=="match")pool.push({c,q});}));
  examQ=shuffle(pool).slice(0,15);
  examIdx=0;examScore=0;
  renderExamQ();
}
function renderExamQ(){
  const v=$("examView");v.classList.remove("hidden");v.innerHTML="";
  if(examIdx>=examQ.length){
    const card=el("div","excard");
    const pct=examScore/examQ.length;
    let verdict;
    if(pct>=0.9)verdict="Ausgezeichnet — du bist bereit für die Prüfung! 🏆";
    else if(pct>=0.7)verdict="Sehr gut — noch ein bisschen Feinschliff bei den schwachen Themen.";
    else if(pct>=0.5)verdict="Solide Basis — wiederhole die Spickzettel der Kapitel mit Fehlern.";
    else verdict="Guter Anfang — arbeite die Kapitel der Reihe nach durch und versuch es nochmal.";
    card.innerHTML=`<div class="num">Endstation · Ergebnis</div>
      <div class="score-hero">${examScore} / ${examQ.length}</div>
      <p style="margin-top:10px;font-size:15px;line-height:1.6">${verdict}</p>`;
    const row=el("div","nextrow");
    const b=el("button","btn-primary","Noch eine Testfahrt");
    b.onclick=startExam;
    row.appendChild(b);card.appendChild(row);
    v.appendChild(card);
    window.scrollTo({top:0});
    return;
  }
  const {c,q}=examQ[examIdx];
  v.appendChild(el("div","exam-progress",`<span>Frage ${examIdx+1} / ${examQ.length}</span><span>${c.line} · Kapitel ${c.id}</span>`));
  const bar=el("div","exam-bar",`<i style="width:${examIdx/examQ.length*100}%"></i>`);
  v.appendChild(bar);
  let answered=false;
  const card=renderExercise(c,q,examIdx,(ok)=>{
    if(answered)return;answered=true;
    if(ok)examScore++;
    const row=el("div","nextrow");
    const b=el("button","btn-primary",examIdx===examQ.length-1?"Zum Ergebnis →":"Weiter →");
    b.onclick=()=>{examIdx++;renderExamQ();};
    row.appendChild(b);card.appendChild(row);
    b.focus({preventScroll:true});
  });
  v.appendChild(card);
  window.scrollTo({top:0});
}

$("backBtn").onclick=renderHome;
renderHome();
</script>
