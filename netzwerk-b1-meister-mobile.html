<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Netzwerk neu B1 · Meister</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   NETZWERK neu B1 — Meister · styles
   Sprachlabor: warm paper, Playfair display, Plex Sans/Mono.
   Functional color: teal=lab, rust=grammar, green=vocab, amber=exam.
   ============================================================ */
:root{
  --paper:#F4F0E6; --ink:#23201A; --ink-soft:#5B554A; --line:#D8D0BE;
  --card:#FBF8F0; --card-2:#FFFFFF;
  --lab:#2B5563;       /* deep teal — primary */
  --lab-2:#3E7180;
  --gram:#B5552A;      /* rust — grammar */
  --vocab:#3F7A4E;     /* green — vocab */
  --exam:#B5852A;      /* amber — exam */
  --rede:#6A4E8C;      /* violet — redemittel */
  --ok:#2E7D52; --no:#C0392B;
  --radius:14px; --shadow:0 1px 0 #fff inset, 0 8px 24px rgba(40,34,22,.08);
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --disp:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55;
  -webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
h1,h2,h3{font-family:var(--disp);font-weight:700;letter-spacing:-.01em;margin:0}
.eyebrow{font-family:var(--mono);text-transform:uppercase;letter-spacing:.18em;
  font-size:11px;color:var(--lab-2);margin:0 0 6px}
.lede{color:var(--ink-soft);max-width:60ch;margin:.4em 0 0}

/* ---- layout: HUD/topbar (shared) ---- */
.hud{display:flex;align-items:center;gap:14px}
.hud .pill{font-family:var(--mono);font-size:12px;background:var(--card);border:1px solid var(--line);
  border-radius:999px;padding:5px 11px;display:flex;gap:6px;align-items:center}
.hud .pill b{color:var(--lab)}
.iconbtn{font-family:var(--mono);font-size:12px;border:1px solid var(--line);background:var(--card);
  border-radius:999px;padding:6px 12px}
.iconbtn:hover{border-color:var(--lab-2);color:var(--lab)}

/* ---- screen head ---- */
.screen-head{margin:0 0 18px}
.screen-head h1{font-size:clamp(26px,4vw,40px);line-height:1.05}
.crumb-back{font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-bottom:10px}
.crumb-back:hover{color:var(--lab)}

/* ---- dashboard: unit rings ---- */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin:6px 0 22px}
.unit-card{display:flex;gap:14px;align-items:center;text-align:left;background:var(--card);
  border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);
  transition:transform .15s,border-color .15s}
.unit-card:hover{transform:translateY(-2px);border-color:var(--lab-2)}
.ring{--p:0;width:54px;height:54px;border-radius:50%;flex:0 0 54px;display:grid;place-items:center;
  background:conic-gradient(var(--lab) calc(var(--p)*1%),#E7E0CF 0)}
.ring span{width:42px;height:42px;border-radius:50%;background:var(--card);display:grid;place-items:center;
  font-family:var(--mono);font-size:14px;font-weight:600;color:var(--lab)}
.ring small{font-size:9px}
.unit-meta{display:flex;flex-direction:column}
.unit-meta .kap{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
.unit-meta strong{font-family:var(--disp);font-size:18px;line-height:1.1}
.unit-meta em{font-style:normal;color:var(--ink-soft);font-size:13px}

.pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 18px}
.pillar{text-align:left;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;
  background:linear-gradient(180deg,var(--card-2),var(--card));box-shadow:var(--shadow)}
.pillar:hover{border-color:var(--lab-2)}
.pillar strong{display:block;font-family:var(--disp);font-size:20px}
.pillar span{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}

.stat-row{display:flex;gap:24px;border-top:1px solid var(--line);padding-top:16px}
.stat b{font-family:var(--disp);font-size:24px;color:var(--lab)}
.stat span{font-family:var(--mono);font-size:11px;color:var(--ink-soft);display:block}

/* ---- grammar list ---- */
.kap-block{margin:0 0 22px}
.kap-h{font-size:20px;margin:0 0 10px;display:flex;gap:10px;align-items:baseline}
.kap-h span{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gram)}
.mod-list{display:flex;flex-direction:column;gap:8px}
.mod-row{display:grid;grid-template-columns:80px 1fr auto;gap:12px;align-items:center;text-align:left;
  background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.mod-row:hover{border-color:var(--gram)}
.mod-bar{height:6px;background:#E7E0CF;border-radius:3px;overflow:hidden}
.mod-bar i{display:block;height:100%;background:var(--gram)}
.mod-txt strong{font-weight:600}
.mod-txt .tag{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-left:8px}
.mod-pct{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}

/* ---- rule + practice ---- */
.rule-pane{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--gram);
  border-radius:12px;padding:20px 22px;margin:0 0 16px}
.rule-title{font-size:26px;margin:.1em 0 .5em}
.rule-block{margin:0 0 14px}
.rule-block h4{margin:0 0 4px;font-family:var(--sans);font-size:14px;font-weight:600;color:var(--gram)}
.rule-block p{margin:0;color:var(--ink)}
.rule-block i{font-family:var(--mono);font-style:normal;font-size:.92em;background:#F0EAD8;
  padding:1px 4px;border-radius:4px}
.rule-block b{color:var(--ink)}
.practice-pane{min-height:10px}

/* ---- exercise card ---- */
.ex-card,.vocab-card{background:var(--card-2);border:1px solid var(--line);border-radius:14px;
  padding:18px 20px;box-shadow:var(--shadow)}
.ex-prog{display:flex;gap:5px;margin:0 0 14px}
.ex-prog i{width:18px;height:5px;border-radius:3px;background:#E2DBC9}
.ex-prog i.done{background:var(--ok)}
.ex-prog i.now{background:var(--lab)}
.ex-type{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--lab-2)}
.ex-q{font-size:17px;margin:.4em 0 .8em}
.blank{font-family:var(--mono);color:var(--gram);letter-spacing:1px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{text-align:left;border:1px solid var(--line);background:var(--card);border-radius:10px;
  padding:11px 14px;font-size:15px;transition:.12s}
.opt:hover{border-color:var(--lab-2)}
.opt.ok{border-color:var(--ok);background:#E9F4ED;color:#1d5e3a}
.opt.no{border-color:var(--no);background:#FBEDEB;color:#922}
.art-opts{flex-direction:row}
.art-opts .opt{flex:1;text-align:center;font-family:var(--mono)}
.input-row{display:flex;gap:8px}
.txt{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:15px;background:var(--card)}
.txt:focus{outline:2px solid var(--lab-2);outline-offset:0;border-color:var(--lab-2)}
.txt.ok{border-color:var(--ok);background:#E9F4ED}
.txt.no{border-color:var(--no);background:#FBEDEB}
.fb{margin:12px 0 4px;font-size:14px;padding:10px 12px;border-radius:10px}
.fb.ok{background:#E9F4ED;color:#1d5e3a}
.fb.no{background:#FBEDEB;color:#922}
.fb span{display:block;color:var(--ink-soft);margin-top:3px;font-size:13px}
.fb u{font-family:var(--mono);text-decoration:none;border-bottom:2px solid currentColor}

/* tokens (order) */
.token-line{min-height:44px;border:1px dashed var(--line);border-radius:10px;padding:8px;display:flex;
  flex-wrap:wrap;gap:6px;margin-bottom:10px;background:#FCFAF3}
.token-line.ok{border-color:var(--ok);border-style:solid;background:#E9F4ED}
.token-line.no{border-color:var(--no);border-style:solid;background:#FBEDEB}
.token-pool{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.token{font-family:var(--mono);font-size:14px;border:1px solid var(--line);background:var(--card);
  border-radius:8px;padding:7px 11px}
.token:hover{border-color:var(--lab-2)}
.token.used{opacity:.32;pointer-events:none}
.token.in-line{background:var(--lab);color:#fff;border-color:var(--lab)}

/* buttons */
.primary{background:var(--lab);color:#fff;border-radius:10px;padding:11px 18px;font-size:15px;font-weight:600;
  margin-top:14px}
.primary:hover{background:var(--lab-2)}
.primary.big{font-size:16px;padding:13px 26px}
.ghost{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:11px 18px;
  font-size:15px;margin-top:14px}
.ghost:hover{border-color:var(--lab-2);color:var(--lab)}
.ghost.wide{width:100%}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.done-h{font-size:22px;margin:6px 0}

/* ---- vocab ---- */
.deck-card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--vocab);
  border-radius:12px;padding:16px 18px;margin:0 0 12px}
.deck-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
.deck-top strong{font-family:var(--disp);font-size:18px}
.deck-num{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.deck-modes{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chip{border:1px solid var(--line);background:var(--card-2);border-radius:999px;padding:7px 14px;font-size:13px}
.chip:hover{border-color:var(--vocab);color:var(--vocab)}
.flip-front{display:flex;align-items:center;gap:10px;justify-content:center;padding:26px 10px;
  font-family:var(--disp);font-size:30px;position:relative}
.flip-front .art{font-family:var(--mono);font-size:16px;color:var(--vocab)}
.flip-back{text-align:center;padding:10px 4px 4px}
.flip-back .en{font-size:20px;margin:0}
.flip-back .ex{font-family:var(--mono);font-size:13px;color:var(--ink-soft);margin:8px 0 0}
.art-word{text-align:center;font-family:var(--disp);font-size:30px;margin:10px 0 16px}
.art-word.small{font-size:22px;font-family:var(--sans);color:var(--ink-soft)}
.spk{font-size:16px;border:1px solid var(--line);border-radius:8px;padding:2px 8px;background:var(--card)}
.spk.small{font-size:12px;padding:1px 6px;margin-left:8px}
.spk:hover{border-color:var(--lab-2)}

/* ---- exam ---- */
.exam-task{background:var(--card-2);border:1px solid var(--line);border-left:4px solid var(--exam);
  border-radius:12px;padding:20px 22px}
.instruction{font-weight:600;margin:0 0 12px}
.exam-text{background:#FCFAF3;border:1px solid var(--line);border-radius:10px;padding:14px 16px;
  font-size:15px;line-height:1.6;margin:0 0 14px}
.rf-row{border-top:1px solid var(--line);padding:12px 0}
.rf-q{margin:0 0 8px}
.rf-opts{display:flex;gap:8px}
.rf-opts .opt{flex:0 0 120px;text-align:center}
.points{margin:0 0 10px;padding-left:18px}
.points li{margin:3px 0}
.hint-line{font-family:var(--mono);font-size:12px;color:var(--ink-soft);background:#F0EAD8;
  border-radius:8px;padding:10px 12px}
.writer{width:100%;min-height:160px;border:1px solid var(--line);border-radius:10px;padding:12px;
  font-size:15px;background:var(--card);resize:vertical}
.wordcount{font-family:var(--mono);font-size:12px;color:var(--ink-soft);text-align:right;margin:6px 0 0}

/* ---- redemittel ---- */
.rede-card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--rede);
  border-radius:12px;padding:14px 18px;margin:0 0 12px}
.rede-card h3{font-size:16px;margin:0 0 8px;color:var(--rede)}
.rede-card ul{margin:0;padding-left:0;list-style:none}
.rede-card li{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:5px 0;border-top:1px dashed var(--line);font-size:14px}
.rede-card li:first-child{border-top:none}

/* ---- overlay (backup) ---- */
.overlay{position:fixed;inset:0;background:rgba(30,26,18,.45);display:grid;place-items:center;z-index:50;padding:20px}
.sheet{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:520px;width:100%;
  box-shadow:0 24px 60px rgba(0,0,0,.25)}
.sheet h3{font-size:20px;margin:0 0 6px}
.sheet p{color:var(--ink-soft);font-size:14px;margin:0 0 12px}
.code-area{width:100%;min-height:90px;font-family:var(--mono);font-size:12px;border:1px solid var(--line);
  border-radius:10px;padding:10px;background:var(--card)}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
:focus-visible{outline:2px solid var(--lab-2);outline-offset:2px}

</style>
<style>
  body{padding-bottom:78px}
  .mtop{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:12px 16px;background:rgba(244,240,230,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line)}
  .mbrand{font-family:var(--disp);font-size:17px;line-height:1}
  .mbrand small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--lab-2)}
  .mtools{display:flex;gap:6px;align-items:center}
  .mmain{padding:18px 16px 8px}
  /* bottom tab bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:grid;grid-template-columns:repeat(5,1fr);
    background:var(--card-2);border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom)}
  .tabbar button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 8px;
    font-size:10.5px;color:var(--ink-soft)}
  .tabbar button .ic{font-size:18px;line-height:1}
  .tabbar button.active{color:var(--lab)}
  .tabbar button.active .ic{transform:translateY(-1px)}
  /* bigger tap targets on mobile */
  .opt,.chip,.token,.primary,.ghost{min-height:46px}
  .unit-grid{grid-template-columns:1fr 1fr}
  .pillars{grid-template-columns:1fr}
  @media(max-width:360px){.unit-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
  <header class="mtop">
    <div class="mbrand">Netzwerk B1<small>Meister</small></div>
    <div class="mtools">
      <span class="pill">XP <b id="hud-xp">0</b></span>

      { h: "Kein zu nach Modalverben",

      { type: "transform", prompt: "Verbinden Sie: Ich finde es interessant. + Ich besichtige die Stadt.",
        answer: "Ich finde es interessant, die Stadt zu besichtigen.",
        accept: ["Ich finde es interessant, die Stadt zu besichtigen"], hint: "es … finden + Komma + zu-Infinitiv am Ende." },

/* ============================================================
   NETZWERK neu B1 — Meister · engine
   Shared by the desktop and mobile builds.
   window.APP_MODE = 'desktop' | 'mobile' is set by each shell.
   ============================================================ */
(function () {
  const D = window.DATA;
  const MODE = window.APP_MODE || "desktop";
  const STORE_KEY = "nw-b1-meister-v1";

  /* ---------- progress (localStorage) ---------- */
  const defaultProgress = () => ({
    xp: 0,
    streak: 0,
    lastDay: null,
    grammar: {},          // moduleId -> {done:[bool per ex], correct:int, seen:int}
    vocab: {},            // cardKey -> {box:1..5, due:ts}
    exam: {},             // taskKey -> true
    createdAt: Date.now()
  });
  let P = load();

  function load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return defaultProgress();
      return Object.assign(defaultProgress(), JSON.parse(raw));
    } catch (e) { return defaultProgress(); }
  }
  function save() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(P)); } catch (e) {}
    renderHUD();
  }
  function bumpStreak() {
    const today = new Date().toISOString().slice(0, 10);
    if (P.lastDay === today) return;
    const yest = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
    P.streak = (P.lastDay === yest) ? P.streak + 1 : 1;
    P.lastDay = today;
  }
  function addXP(n) { P.xp += n; bumpStreak(); save(); }

  /* ---------- helpers ---------- */
  const $ = (sel, root) => (root || document).querySelector(sel);
  const el = (tag, cls, html) => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  };
  const norm = (s) => (s || "").toLowerCase()
    .replace(/[.,!?;:]/g, "").replace(/\s+/g, " ").trim();
  const shuffle = (a) => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0;[a[i], a[j]] = [a[j], a[i]]; } return a; };

  function speak(text) {
    if (!("speechSynthesis" in window)) return;
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "de-DE"; u.rate = 0.92;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    } catch (e) {}
  }

  /* ---------- routing ---------- */
  const ROOT = () => $("#view");
  let current = { screen: "dash" };

  function go(screen, params) {
    current = Object.assign({ screen }, params || {});
    render();
    if (MODE === "mobile") window.scrollTo(0, 0);
    setActiveNav(screen);
  }
  function setActiveNav(screen) {
    document.querySelectorAll("[data-nav]").forEach(b => {
      b.classList.toggle("active", b.dataset.nav === screen);
    });
  }

  function render() {
    const r = ROOT(); r.innerHTML = "";
    if (current.screen === "dash") return renderDash(r);
    if (current.screen === "grammar") return renderGrammarList(r);
    if (current.screen === "module") return renderModule(r, current.id);
    if (current.screen === "vocab") return renderVocabList(r);
    if (current.screen === "deck") return renderDeck(r, current.id, current.modeV);
    if (current.screen === "exam") return renderExamList(r);
    if (current.screen === "examtask") return renderExamTask(r, current.kind, current.idx);
    if (current.screen === "redemittel") return renderRedemittel(r);
  }

  /* ---------- HUD ---------- */
  function renderHUD() {
    const x = $("#hud-xp"), s = $("#hud-streak");
    if (x) x.textContent = P.xp;
    if (s) s.textContent = P.streak;
  }

  /* ====================================================
     DASHBOARD
  ==================================================== */
  function moduleStats(id) {
    const m = P.grammar[id]; const total = D.grammar[id].exercises.length;
    if (!m) return { pct: 0, total, correct: 0 };
    const done = (m.done || []).filter(Boolean).length;
    return { pct: Math.round((done / total) * 100), total, correct: m.correct || 0 };
  }
  function unitMastery(u) {
    let done = 0, total = 0;
    u.grammar.forEach(id => { const s = moduleStats(id); done += Math.round(s.pct / 100 * s.total); total += s.total; });
    // vocab contribution
    const deck = D.vocab[u.vocab];
    deck.cards.forEach(c => {
      const k = u.vocab + "::" + c.de; total += 1;
      const v = P.vocab[k]; if (v && v.box >= 4) done += 1; else if (v && v.box >= 2) done += 0.5;
    });
    return total ? Math.round(done / total * 100) : 0;
  }

  function renderDash(r) {
    const head = el("div", "screen-head");
    head.appendChild(el("p", "eyebrow", "Sprachlabor"));
    head.appendChild(el("h1", null, "Netzwerk neu B1 · Meister"));
    head.appendChild(el("p", "lede", "Sechs Kapitel. Regel, Übung, Wiederholung — in kurzen Schleifen. Wähle ein Kapitel oder geh direkt zu Wortschatz und Prüfung."));
    r.appendChild(head);

    // ring summary
    const grid = el("div", "unit-grid");
    D.units.forEach(u => {
      const pct = unitMastery(u);
      const card = el("button", "unit-card");
      card.innerHTML =
        `<div class="ring" style="--p:${pct}"><span>${pct}<small>%</small></span></div>
         <div class="unit-meta"><span class="kap">Kapitel ${u.id}</span>
         <strong>${u.title}</strong><em>${u.theme}</em></div>`;
      card.onclick = () => go("grammar", { focus: u.id });
      grid.appendChild(card);
    });
    r.appendChild(grid);

    // three pillars quick links
    const pillars = el("div", "pillars");
    [["Grammatik", "grammar", D.units.reduce((n, u) => n + u.grammar.length, 0) + " Module"],
     ["Wortschatz", "vocab", Object.values(D.vocab).reduce((n, d) => n + d.cards.length, 0) + " Karten"],
     ["Prüfung", "exam", "Zertifikat B1"]].forEach(([t, scr, sub]) => {
      const p = el("button", "pillar");
      p.innerHTML = `<strong>${t}</strong><span>${sub}</span>`;
      p.onclick = () => go(scr);
      pillars.appendChild(p);
    });
    r.appendChild(pillars);

    // stats footer
    const sf = el("div", "stat-row");
    sf.innerHTML =
      `<div class="stat"><b>${P.xp}</b><span>XP</span></div>
       <div class="stat"><b>${P.streak}</b><span>Tage in Folge</span></div>
       <div class="stat"><b>${vocabDueCount()}</b><span>Karten fällig</span></div>`;
    r.appendChild(sf);
  }

  /* ====================================================
     GRAMMAR
  ==================================================== */
  function renderGrammarList(r) {
    r.appendChild(crumb("Grammatik"));
    D.units.forEach(u => {
      const sec = el("section", "kap-block");

  function renderModule(r, id) {
    const m = D.grammar[id];
    r.appendChild(crumb(m.title, () => go("grammar")));

    // RULE pane
    const rule = el("div", "rule-pane");
    rule.appendChild(el("p", "eyebrow", "Regel · Kapitel " + m.unit));
    rule.appendChild(el("h2", "rule-title", m.title));
    m.rule.forEach(sec => {
      const b = el("div", "rule-block");
      b.appendChild(el("h4", null, sec.h));
      b.appendChild(el("p", null, sec.body));
      rule.appendChild(b);
    });
    const startBtn = el("button", "primary big", "Üben →");
    rule.appendChild(startBtn);
    r.appendChild(rule);

    // PRACTICE pane (hidden until start, side-by-side on desktop)
    const practice = el("div", "practice-pane");
    r.appendChild(practice);
    startBtn.onclick = () => { runDrills(practice, id); if (practice.scrollIntoView) practice.scrollIntoView({ behavior: "smooth", block: "start" }); };

    if (MODE === "desktop") runDrills(practice, id); // show immediately on desktop
  }

  function runDrills(host, id) {
    const m = D.grammar[id];
    const exs = m.exercises;
    let i = 0, correctCount = 0;
    P.grammar[id] = P.grammar[id] || { done: new Array(exs.length).fill(false), correct: 0, seen: 0 };

    function step() {
      host.innerHTML = "";
      const card = el("div", "ex-card");
      const prog = el("div", "ex-prog");
      for (let k = 0; k < exs.length; k++) {
        const d = el("i"); if (k < i) d.className = "done"; if (k === i) d.className = "now";
        prog.appendChild(d);
      }
      card.appendChild(prog);

      if (i >= exs.length) {
        card.appendChild(el("h3", "done-h", "Modul geschafft 🎉"));
        card.appendChild(el("p", null, `Richtig: <b>${correctCount} / ${exs.length}</b>`));
        const again = el("button", "ghost", "Nochmal üben");
        again.onclick = () => { i = 0; correctCount = 0; step(); };
        const back = el("button", "primary", "Zurück zur Liste");
        back.onclick = () => go("grammar");
        const row = el("div", "btn-row"); row.append(again, back); card.appendChild(row);
        host.appendChild(card);
        return;
      }

      const ex = exs[i];
      card.appendChild(el("span", "ex-type", typeLabel(ex.type)));
      renderExercise(card, ex, (ok) => {
        P.grammar[id].seen++;
        if (ok) { correctCount++; if (!P.grammar[id].done[i]) { P.grammar[id].done[i] = true; P.grammar[id].correct++; addXP(10); } else save(); }
        else save();
        const next = el("button", "primary", i + 1 >= exs.length ? "Fertig" : "Weiter →");
        next.onclick = () => { i++; step(); };
        card.appendChild(next);
        next.focus();
      });
      host.appendChild(card);
    }
    step();
  }

  function typeLabel(t) {
    return { mc: "Multiple Choice", gap: "Lücke füllen", transform: "Umformen", order: "Wörter ordnen" }[t] || t;
  }

  /* ---------- exercise renderers ---------- */
  function renderExercise(card, ex, done) {
    if (ex.type === "mc") return renderMC(card, ex, done);
    if (ex.type === "gap") return renderGap(card, ex, done);
    if (ex.type === "transform") return renderTransform(card, ex, done);
    if (ex.type === "order") return renderOrder(card, ex, done);
  }

  function feedback(card, ok, solution, hint) {
    const fb = el("div", "fb " + (ok ? "ok" : "no"));
    fb.innerHTML = ok
      ? `<b>Richtig!</b> ${hint ? "<span>" + hint + "</span>" : ""}`
      : `<b>Noch nicht.</b> Lösung: <u>${solution}</u> ${hint ? "<span>" + hint + "</span>" : ""}`;
    card.appendChild(fb);
  }

  function renderMC(card, ex, done) {
    card.appendChild(el("p", "ex-q", ex.q));
    const opts = el("div", "opts");
    let answered = false;
    ex.options.forEach((o, k) => {
      const b = el("button", "opt", o);
      b.onclick = () => {
        if (answered) return; answered = true;
        const ok = k === ex.answer;
        b.classList.add(ok ? "ok" : "no");
        if (!ok) opts.children[ex.answer].classList.add("ok");
        feedback(card, ok, ex.options[ex.answer], ex.hint);
        done(ok);
      };
      opts.appendChild(b);
    });
    card.appendChild(opts);
  }

  function renderGap(card, ex, done) {
    const q = el("p", "ex-q"); q.innerHTML = ex.q.replace("___", '<span class="blank">_____</span>');
    card.appendChild(q);
    const row = el("div", "input-row");
    const inp = el("input", "txt"); inp.type = "text"; inp.placeholder = "Antwort …"; inp.autocomplete = "off";
    const check = el("button", "primary", "Prüfen");
    row.append(inp, check); card.appendChild(row);
    let answered = false;
    const accept = [ex.answer].concat(ex.alt || [], ex.accept || []).map(norm);
    function go2() {
      if (answered) return; answered = true;
      const ok = accept.includes(norm(inp.value));
      inp.classList.add(ok ? "ok" : "no"); inp.disabled = true; check.disabled = true;
      feedback(card, ok, ex.answer || "(leer)", ex.hint);
      done(ok);
    }
    check.onclick = go2;
    inp.addEventListener("keydown", e => { if (e.key === "Enter") go2(); });
    setTimeout(() => inp.focus(), 30);
  }

  function renderTransform(card, ex, done) {
    card.appendChild(el("p", "ex-q", ex.prompt));
    const row = el("div", "input-row");
    const inp = el("input", "txt"); inp.type = "text"; inp.placeholder = "Ganzer Satz …"; inp.autocomplete = "off";
    const check = el("button", "primary", "Prüfen");
    row.append(inp, check); card.appendChild(row);
    let answered = false;
    const accept = [ex.answer].concat(ex.accept || []).map(norm);
    function go2() {
      if (answered) return; answered = true;
      const ok = accept.includes(norm(inp.value));
      inp.classList.add(ok ? "ok" : "no"); inp.disabled = true; check.disabled = true;
      feedback(card, ok, ex.answer, ex.hint);
      done(ok);
    }
    check.onclick = go2;
    inp.addEventListener("keydown", e => { if (e.key === "Enter") go2(); });
    setTimeout(() => inp.focus(), 30);
  }

  function renderOrder(card, ex, done) {
    card.appendChild(el("p", "ex-q", ex.q || "Bringen Sie die Wörter in die richtige Reihenfolge:"));
    const pool = el("div", "token-pool");
    const line = el("div", "token-line");
    card.appendChild(line); card.appendChild(pool);
    const chosen = [];
    shuffle(ex.tokens).forEach(tok => {
      const t = el("button", "token", tok);
      t.onclick = () => {
        if (t.classList.contains("used")) return;
        t.classList.add("used");
        chosen.push(tok);
        const lt = el("button", "token in-line", tok);
        lt.onclick = () => { lt.remove(); t.classList.remove("used"); const ix = chosen.indexOf(tok); if (ix > -1) chosen.splice(ix, 1); };
        line.appendChild(lt);
      };
      pool.appendChild(t);
    });
    const check = el("button", "primary", "Prüfen");
    card.appendChild(check);
    let answered = false;
    check.onclick = () => {
      if (answered) return; answered = true;
      const ok = norm(chosen.join(" ")) === norm(ex.answer);
      line.classList.add(ok ? "ok" : "no");
      feedback(card, ok, ex.answer, ex.hint);
      done(ok);
    };
  }

  /* ====================================================
     VOCAB — Leitner SRS
  ==================================================== */
  const BOX_DAYS = { 1: 0, 2: 1, 3: 3, 4: 7, 5: 16 };
  function cardKey(deckId, de) { return deckId + "::" + de; }
  function cardState(deckId, de) {
    const k = cardKey(deckId, de);
    return P.vocab[k] || { box: 1, due: 0 };
  }
  function setCard(deckId, de, ok) {
    const k = cardKey(deckId, de);
    const st = P.vocab[k] || { box: 1, due: 0 };
    st.box = ok ? Math.min(5, st.box + 1) : 1;
    st.due = Date.now() + BOX_DAYS[st.box] * 864e5;
    P.vocab[k] = st;
    if (ok) addXP(4); else save();
  }
  function vocabDueCount() {
    let n = 0; const now = Date.now();
    D.units.forEach(u => D.vocab[u.vocab].cards.forEach(c => {
      const st = P.vocab[cardKey(u.vocab, c.de)];
      if (!st || st.due <= now) n++;
    }));
    return n;
  }

  function renderVocabList(r) {
    r.appendChild(crumb("Wortschatz"));
    r.appendChild(el("p", "lede", "Leitner-System: Was du kannst, kommt seltener; was schwerfällt, öfter. Wähle einen Übungsmodus pro Deck."));
    Object.keys(D.vocab).forEach(id => {
      const deck = D.vocab[id];
      const due = deck.cards.filter(c => { const st = P.vocab[cardKey(id, c.de)]; return !st || st.due <= Date.now(); }).length;
      const learned = deck.cards.filter(c => { const st = P.vocab[cardKey(id, c.de)]; return st && st.box >= 4; }).length;
      const sec = el("div", "deck-card");
      sec.innerHTML =
        `<div class="deck-top"><strong>${deck.title}</strong>
         <span class="deck-num">${learned}/${deck.cards.length} gelernt · ${due} fällig</span></div>`;
      const modes = el("div", "deck-modes");
      [["Karteikarten", "flip"], ["Artikel-Quiz", "article"], ["EN → DE tippen", "type"]].forEach(([label, mv]) => {
        const b = el("button", "chip", label);
        b.onclick = () => go("deck", { id, modeV: mv });
        modes.appendChild(b);
      });
      sec.appendChild(modes);
      r.appendChild(sec);
    });
  }

  function dueCards(deckId, nounsOnly) {
    const deck = D.vocab[deckId];
    const now = Date.now();
    let pool = nounsOnly ? deck.cards.filter(c => c.art) : deck.cards;
    let due = pool.filter(c => { const st = P.vocab[cardKey(deckId, c.de)]; return !st || st.due <= now; });
    if (due.length === 0) due = pool.slice(); // nothing due → review all
    return shuffle(due);
  }

  function renderDeck(r, deckId, modeV) {
    const deck = D.vocab[deckId];
    r.appendChild(crumb(deck.title, () => go("vocab")));
    const queue = dueCards(deckId, modeV === "article");
    let i = 0, right = 0;
    const host = el("div", "deck-host"); r.appendChild(host);

    function step() {
      host.innerHTML = "";
      if (i >= queue.length) {
        const done = el("div", "ex-card");
        done.appendChild(el("h3", "done-h", "Runde fertig ✓"));
        done.appendChild(el("p", null, `Gewusst: <b>${right} / ${queue.length}</b>`));
        const again = el("button", "ghost", "Neue Runde");
        again.onclick = () => go("deck", { id: deckId, modeV });
        const back = el("button", "primary", "Zu den Decks");
        back.onclick = () => go("vocab");
        const row = el("div", "btn-row"); row.append(again, back); done.appendChild(row);
        host.appendChild(done);
        return;
      }
      const c = queue[i];
      const card = el("div", "vocab-card");
      const meter = el("div", "ex-prog");
      for (let k = 0; k < queue.length; k++) { const d = el("i"); if (k < i) d.className = "done"; if (k === i) d.className = "now"; meter.appendChild(d); }
      card.appendChild(meter);

      if (modeV === "flip") flipCard(card, c, deckId, after);
      else if (modeV === "article") articleCard(card, c, deckId, after);
      else typeCard(card, c, deckId, after);

      host.appendChild(card);
      function after(ok) { if (ok) right++; setCard(deckId, c.de, ok); i++; setTimeout(step, ok ? 420 : 1100); }
    }
    step();
  }

  function flipCard(card, c, deckId, after) {
    const front = el("div", "flip-front");
    front.innerHTML = `<span class="art">${c.art || ""}</span><b>${c.de.replace(/^(der|die|das)\s/, "")}</b>`;
    const sp = el("button", "spk", "🔊"); sp.onclick = (e) => { e.stopPropagation(); speak(c.de); };
    front.appendChild(sp);
    card.appendChild(front);
    const reveal = el("button", "ghost wide", "Umdrehen");
    card.appendChild(reveal);
    reveal.onclick = () => {
      reveal.remove();
      const back = el("div", "flip-back");
      back.innerHTML = `<p class="en">${c.en}</p>${c.ex ? '<p class="ex">' + c.ex + "</p>" : ""}`;
      card.appendChild(back);
      const row = el("div", "btn-row");
      const no = el("button", "ghost", "Nochmal"); no.onclick = () => after(false);
      const yes = el("button", "primary", "Gewusst"); yes.onclick = () => after(true);
      row.append(no, yes); card.appendChild(row);
      speak(c.de);
    };
  }

  function articleCard(card, c, deckId, after) {
    const bare = c.de.replace(/^(der|die|das)\s/, "");
    if (!c.art) { after(true); return; } // skip non-nouns gracefully
    card.appendChild(el("p", "ex-q", "Welcher Artikel?"));
    card.appendChild(el("div", "art-word", bare));
    const opts = el("div", "opts art-opts");
    let answered = false;
    ["der", "die", "das"].forEach(a => {
      const b = el("button", "opt", a);
      b.onclick = () => {
        if (answered) return; answered = true;
        const ok = a === c.art;
        b.classList.add(ok ? "ok" : "no");
        if (!ok) [...opts.children].find(x => x.textContent === c.art).classList.add("ok");
        feedback(card, ok, c.art + " " + bare, c.en);
        speak(c.de);
        const n = el("button", "primary", "Weiter →"); n.onclick = () => after(ok); card.appendChild(n); n.focus();
      };
      opts.appendChild(b);
    });
    card.appendChild(opts);
  }

  function typeCard(card, c, deckId, after) {
    card.appendChild(el("p", "ex-q", "Wie heißt das auf Deutsch?"));
    card.appendChild(el("div", "art-word small", c.en));
    const row = el("div", "input-row");
    const inp = el("input", "txt"); inp.type = "text"; inp.placeholder = "mit Artikel …"; inp.autocomplete = "off";
    const check = el("button", "primary", "Prüfen");
    row.append(inp, check); card.appendChild(row);
    let answered = false;
    const target = norm(c.de);
    const bare = norm(c.de.replace(/^(der|die|das)\s/, ""));
    function go2() {
      if (answered) return; answered = true;
      const v = norm(inp.value);
      const ok = v === target || v === bare;
      inp.classList.add(ok ? "ok" : "no"); inp.disabled = true; check.disabled = true;
      feedback(card, ok, c.de, c.ex || "");
      speak(c.de);
      const n = el("button", "primary", "Weiter →"); n.onclick = () => after(ok); card.appendChild(n); n.focus();
    }
    check.onclick = go2;
    inp.addEventListener("keydown", e => { if (e.key === "Enter") go2(); });
    setTimeout(() => inp.focus(), 30);
  }

  /* ====================================================
     EXAM
  ==================================================== */
  function renderExamList(r) {
    r.appendChild(crumb("Prüfung"));
    r.appendChild(el("p", "lede", "Aufgabentypen im Format Zertifikat B1 / DTZ — Lesen, Schreiben, Sprechen."));
    const map = [["lesen", "Lesen · Richtig/Falsch"], ["reading", "Lesen · Überschriften"], ["schreiben", "Schreiben"], ["sprechen", "Sprechen"]];
    map.forEach(([kind, label]) => {
      const sec = el("section", "kap-block");
      sec.appendChild(el("h2", "kap-h", `<span>Teil</span> ${label}`));
      const list = el("div", "mod-list");
      D.exam[kind].forEach((t, idx) => {
        const done = P.exam[kind + idx];
        const row = el("button", "mod-row");
        row.innerHTML = `<div class="mod-txt"><strong>${t.title}</strong></div><div class="mod-pct">${done ? "✓" : "›"}</div>`;
        row.onclick = () => go("examtask", { kind, idx });
        list.appendChild(row);
      });
      sec.appendChild(list);
      r.appendChild(sec);
    });

  function renderExamTask(r, kind, idx) {
    const t = D.exam[kind][idx];
    r.appendChild(crumb(t.title, () => go("exam")));
    const box = el("div", "exam-task");
    box.appendChild(el("p", "instruction", t.instruction));

    if (kind === "lesen") {
      box.appendChild(el("div", "exam-text", t.text));
      let answered = 0, right = 0;
      t.items.forEach(it => {
        const q = el("div", "rf-row");
        q.appendChild(el("p", "rf-q", it.q));
        const opts = el("div", "rf-opts");
        ["richtig", "falsch"].forEach((lab, k) => {
          const want = (k === 0);
          const b = el("button", "opt", lab);
          b.onclick = () => {
            if (q.dataset.done) return; q.dataset.done = "1"; answered++;
            const ok = want === it.answer;
            b.classList.add(ok ? "ok" : "no");
            if (ok) right++;
            if (answered === t.items.length) finish(box, right, t.items.length, kind, idx);
          };
          opts.appendChild(b);
        });
        q.appendChild(opts); box.appendChild(q);
      });
    } else if (kind === "reading") {
      box.appendChild(el("div", "exam-text", t.text));
      const opts = el("div", "opts");
      let answered = false;
      t.options.forEach((o, k) => {
        const b = el("button", "opt", o);
        b.onclick = () => {
          if (answered) return; answered = true;
          const ok = k === t.answer;
          b.classList.add(ok ? "ok" : "no");
          if (!ok) opts.children[t.answer].classList.add("ok");
          finish(box, ok ? 1 : 0, 1, kind, idx);
        };
        opts.appendChild(b);
      });
      box.appendChild(opts);
    } else if (kind === "schreiben") {
      const pts = el("ul", "points"); t.points.forEach(p => pts.appendChild(el("li", null, p))); box.appendChild(pts);
      box.appendChild(el("p", "hint-line", t.hints));
      const ta = el("textarea", "writer"); ta.placeholder = "Schreiben Sie hier …";
      const count = el("p", "wordcount", "0 Wörter");
      ta.addEventListener("input", () => {
        const w = ta.value.trim().split(/\s+/).filter(Boolean).length;
        count.textContent = w + " Wörter";
      });
      box.appendChild(ta); box.appendChild(count);
      const b = el("button", "primary", "Als erledigt markieren");
      b.onclick = () => { P.exam[kind + idx] = true; addXP(15); finish(box, 1, 1, kind, idx, true); };
      box.appendChild(b);
    } else { // sprechen
      box.appendChild(el("p", "hint-line", t.hints));
      const b = el("button", "primary", "Geübt — erledigt");
      b.onclick = () => { P.exam[kind + idx] = true; addXP(15); finish(box, 1, 1, kind, idx, true); };
      box.appendChild(b);
    }
    r.appendChild(box);
  }

  function finish(box, right, total, kind, idx, silent) {
    if (!silent) { P.exam[kind + idx] = true; addXP(right * 10); }
    const fb = el("div", "fb ok");
    fb.innerHTML = silent ? "<b>Erledigt ✓</b>" : `<b>Fertig.</b> Richtig: ${right} / ${total}`;
    box.appendChild(fb);
    const back = el("button", "ghost", "Zurück zur Prüfungsliste");
    back.onclick = () => go("exam");
    box.appendChild(back);
  }

    const c = el("div", "screen-head");
    if (back) { const b = el("button", "crumb-back", "← zurück"); b.onclick = back; c.appendChild(b); }

  /* ====================================================
     BACKUP / RESTORE (Sichern / Laden)
  ==================================================== */
  function exportCode() {
    return btoa(unescape(encodeURIComponent(JSON.stringify(P))));
  }
  function importCode(code) {
    try {
      const obj = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
      P = Object.assign(defaultProgress(), obj); save(); render(); return true;
    } catch (e) { return false; }
  }

  function openBackup() {
    const ov = el("div", "overlay");
    const sheet = el("div", "sheet");
    sheet.innerHTML = `<h3>Fortschritt sichern / laden</h3>
      <p>Kopiere den Code zum Sichern, oder füge einen Code ein und lade ihn — so nimmst du deinen Fortschritt auf ein anderes Gerät mit.</p>`;
    const ta = el("textarea", "code-area"); ta.value = exportCode(); ta.readOnly = false;
    sheet.appendChild(ta);
    const row = el("div", "btn-row");
    const copy = el("button", "primary", "Code kopieren");
    copy.onclick = () => { ta.select(); document.execCommand && document.execCommand("copy"); copy.textContent = "Kopiert ✓"; };
    const loadB = el("button", "ghost", "Code laden");
    loadB.onclick = () => { if (importCode(ta.value)) { close(); } else { loadB.textContent = "Ungültiger Code"; } };
    const cl = el("button", "ghost", "Schließen"); cl.onclick = close;
    row.append(copy, loadB, cl); sheet.appendChild(row);
    ov.appendChild(sheet); document.body.appendChild(ov);
    ov.onclick = (e) => { if (e.target === ov) close(); };
    function close() { ov.remove(); }
  }
  function resetAll() {
    if (!confirm("Wirklich den gesamten Fortschritt löschen?")) return;
    P = defaultProgress(); save(); render();
  }

  /* ====================================================
     NAV WIRING + KEYBOARD
  ==================================================== */
  function wireNav() {
    document.querySelectorAll("[data-nav]").forEach(b => {
      b.onclick = () => go(b.dataset.nav);
    });
    const sb = $("#btn-backup"); if (sb) sb.onclick = openBackup;
    const rb = $("#btn-reset"); if (rb) rb.onclick = resetAll;
  }

  if (MODE === "desktop") {
    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      const keys = { "1": "dash", "2": "grammar", "3": "vocab", "4": "exam", "5": "redemittel" };
      if (keys[e.key]) go(keys[e.key]);
    });
  }

  /* ---------- boot ---------- */
  window.NWB1 = { go, boot() { P = load(); wireNav(); renderHUD(); go("dash"); } };
})();

</script>
<script>NWB1.boot();</script>
</body>
</html>
